                                    <div className="bg-white rounded-2xl shadow-sm border">
                                        <div className="p-4 border-b font-bold text-slate-700">Kết quả: {reportPeople.length} người</div>
                                        <div className="divide-y max-h-[60vh] overflow-y-auto">
                                            {reportPeople.map(p=>(
                                                <div key={p.id} className="px-5 py-3 flex items-center gap-3">
                                                    <span className={`w-2 h-2 rounded-full ${p.status==='received'?'bg-green-500':'bg-amber-400'}`}></span>
                                                    <div className="flex-1 min-w-0"><p className="font-semibold text-sm truncate">{p.name}</p><p className="text-xs text-slate-400 truncate">{p.personalId} · {p.address} · {p.category}</p></div>
                                                    <button onClick={()=>setShowQrModal(p)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><Icon name="qr-code" size={16}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ADMIN TAB */}
                            {activeTab === 'admin' && (
                                <div className="space-y-5 animate-fade-in max-w-3xl mx-auto">
                                    <div className="bg-white rounded-2xl shadow-sm border p-5">
                                        <h3 className="font-bold text-lg mb-4 flex gap-2 items-center"><Icon name="shield-check" size={22} className="text-blue-600"/>Vai trò thao tác</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={()=>setActiveRole('admin')} className={`p-4 rounded-xl border text-left ${activeRole==='admin'?'bg-blue-50 border-blue-300 text-blue-700':'bg-slate-50 text-slate-600'}`}><b>Admin</b><br/><span className="text-xs">Thêm, sửa, xóa, phục hồi</span></button>
                                            <button onClick={()=>setActiveRole('operator')} className={`p-4 rounded-xl border text-left ${activeRole==='operator'?'bg-green-50 border-green-300 text-green-700':'bg-slate-50 text-slate-600'}`}><b>Phát quà</b><br/><span className="text-xs">Check-in và xem dữ liệu</span></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <button onClick={()=>setShowTrashModal(true)} className="bg-white border rounded-2xl p-5 text-left shadow-sm hover:bg-red-50"><Icon name="archive-restore" size={24} className="text-red-500 mb-2"/><b>Thùng rác</b><p className="text-sm text-slate-500">{trashPeople.length} người, {trashWaves.length} đợt có thể khôi phục</p></button>
                                        <button onClick={()=>setShowAuditModal(true)} className="bg-white border rounded-2xl p-5 text-left shadow-sm hover:bg-slate-50"><Icon name="clipboard-list" size={24} className="text-slate-600 mb-2"/><b>Nhật ký thao tác</b><p className="text-sm text-slate-500">{auditLogs.length} sự kiện gần nhất</p></button>
                                    </div>
                                </div>
                            )}

                            {/* HISTORY TAB */}
                            {activeTab === 'history' && (
                                <div className="space-y-4 animate-fade-in">
                                    {waves.length === 0 && (
                                        <div className="text-center py-16 text-slate-400">
                                            <Icon name="history" size={40} className="mx-auto mb-3 opacity-30"/>
                                            <p className="font-medium">Chưa có đợt phát nào</p>
                                        </div>
                                    )}
                                    {waves.map(w => (
                                        <div key={w.id} className="bg-white rounded-2xl shadow-sm border p-5 flex flex-col md:flex-row md:items-center gap-4">
                                            <div className="bg-purple-100 p-3 rounded-xl self-start shrink-0"><Icon name="gift" size={24} className="text-purple-600"/></div>
                                            <div className="flex-1">
                                                <h4 className="font-bold text-slate-800">{w.name}</h4>
                                                <div className="flex flex-wrap gap-3 mt-1 text-xs text-slate-500">
                                                    <span className="flex items-center gap-1"><Icon name="calendar" size={12}/>{w.date}</span>
                                                    <span className="flex items-center gap-1"><Icon name="users" size={12}/>{w.count} suất</span>
                                                    <span className="flex items-center gap-1"><Icon name="filter" size={12}/>{w.criteria}</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2 self-start md:self-center flex-wrap">
                                                <button onClick={()=>setViewingWave(w)} className="bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5">
                                                    <Icon name="eye" size={15}/> Xem
                                                </button>
                                                <button onClick={()=>openEditWaveModal(w)} className="bg-amber-50 text-amber-600 hover:bg-amber-100 px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5">
                                                    <Icon name="edit-2" size={15}/> Sửa
                                                </button>
                                                <button onClick={()=>handleDeleteWave(w.id)} className="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5">
                                                    <Icon name="trash-2" size={15}/> Xóa
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* MOBILE BOTTOM NAV (kiểu app điện thoại) */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur border-t border-slate-200 flex justify-around items-stretch pb-safe shadow-[0_-2px_12px_rgba(15,23,42,0.06)]">
                        {[
                            { id:'dashboard', icon:'layout-grid', label:'Tổng quan' },
                            { id:'import', icon:'users', label:'Dữ liệu' },
                            { id:'create-wave', icon:'gift', label:'Phát quà' },
                            { id:'history', icon:'history', label:'Lịch sử' },
                        ].map(t => {
                            const on = activeTab === t.id;
                            return (
                                <button key={t.id} onClick={() => setActiveTab(t.id)}
                                    className={`bottom-nav-btn flex-1 flex flex-col items-center justify-center gap-0.5 pt-2 pb-1.5 ${on ? 'text-blue-600' : 'text-slate-400'}`}>
                                    <span className={`flex items-center justify-center rounded-xl px-4 py-1 transition-colors ${on ? 'bg-blue-50' : ''}`}>
                                        <Icon name={t.icon} size={21}/>
                                    </span>
                                    <span className={`text-[10px] ${on ? 'font-bold' : 'font-semibold'}`}>{t.label}</span>
                                </button>
                            );
                        })}
                    </div>

                    {/* VIEW WAVE MODAL */}
                    {viewingWave && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col md:max-h-[85vh] max-h-full">
                                <div className="p-5 border-b flex justify-between items-center md:rounded-t-2xl bg-purple-50">
                                    <div>
                                        <h3 className="font-bold text-slate-800">{viewingWave.name}</h3>
                                        <p className="text-xs text-slate-500">{viewingWave.count} người · {viewingWave.date}</p>
                                    </div>
                                    <button onClick={()=>setViewingWave(null)} className="p-2 hover:bg-purple-100 rounded-xl text-slate-500"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-0">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-white sticky top-0 shadow-sm z-10">
                                            <tr><th className="px-4 py-3 text-xs text-slate-500 uppercase bg-slate-50">STT</th><th className="px-4 py-3 text-xs text-slate-500 uppercase bg-slate-50">Họ Tên</th><th className="px-4 py-3 text-xs text-slate-500 uppercase bg-slate-50">Chi tiết</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {viewingWave.recipients.map((p,i) => (
                                                <tr key={p.id} className="text-sm">
                                                    <td className="px-4 py-3 text-slate-400 font-mono">{i+1}</td>
                                                    <td className="px-4 py-3 font-medium text-slate-800">{p.name}<br/><span className="text-xs font-normal text-slate-400 font-mono">{p.personalId}</span></td>
                                                    <td className="px-4 py-3 text-slate-500 text-xs">{p.address} • {p.category}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 border-t bg-white md:rounded-b-2xl">
                                    <button onClick={()=>handleExportWaveExcel(viewingWave)} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-200 flex justify-center items-center gap-2">
                                        <Icon name="file-down" size={20}/> Xuất Excel Đợt Này
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EDIT WAVE MODAL */}
                    {editingWave && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                                <h3 className="font-bold text-lg mb-6 flex gap-2 items-center text-slate-800 border-b pb-2"><Icon name="edit-2" size={24} className="text-amber-500"/> Sửa đợt phát</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Tên đợt phát <span className="text-red-500">*</span></label>
                                        <input className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-amber-500" value={editWaveForm.name} onChange={e=>setEditWaveForm({...editWaveForm,name:e.target.value})} placeholder="Tên đợt phát"/>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Ngày phát</label>
                                        <input type="date" className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-amber-500" value={editWaveForm.date} onChange={e=>setEditWaveForm({...editWaveForm,date:e.target.value})}/>
                                    </div>
                                    <div className="bg-slate-50 rounded-xl p-3 text-xs text-slate-500">
                                        <Icon name="info" size={13} className="inline mr-1"/>Danh sách người nhận và số suất không thay đổi khi sửa.
                                    </div>
                                    <div className="flex gap-2 justify-end pt-2">
                                        <button onClick={()=>setEditingWave(null)} className="px-5 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium">Hủy</button>
                                        <button onClick={handleSaveEditWave} className="bg-amber-500 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-amber-600">Lưu</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {editingPerson && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                                <h3 className="font-bold text-lg mb-6 flex gap-2 items-center text-slate-800 border-b pb-2"><Icon name="user-cog" size={24} className="text-blue-600"/> Sửa thông tin</h3>
                                <div className="space-y-4">
                                    <input className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-500" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} placeholder="Họ tên"/>
                                    <input className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-500" value={editForm.personalId} onChange={e=>setEditForm({...editForm,personalId:e.target.value})} placeholder="CCCD/ID"/>
                                    <input className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-500" value={editForm.address} onChange={e=>setEditForm({...editForm,address:e.target.value})} placeholder="Địa chỉ"/>
                                    <div className="flex gap-2 justify-end pt-4">
                                        <button onClick={()=>setEditingPerson(null)} className="px-5 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium">Hủy</button>
                                        <button onClick={handleSaveEdit} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700">Lưu</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ADD PERSON MODAL */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                                <h3 className="font-bold text-lg mb-6 flex gap-2 items-center text-slate-800 border-b pb-2"><Icon name="user-plus" size={24} className="text-purple-600"/> Thêm người mới</h3>
                                <div className="space-y-4">
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Họ và tên <span className="text-red-500">*</span></label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.name} onChange={e=>setAddForm({...addForm,name:e.target.value})} placeholder="Nhập họ tên..."/></div>
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">CCCD / Mã định danh</label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.personalId} onChange={e=>setAddForm({...addForm,personalId:e.target.value})} placeholder="Nhập số CCCD..."/></div>
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Địa chỉ</label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.address} onChange={e=>setAddForm({...addForm,address:e.target.value})} placeholder="Nhập thôn/xóm..."/></div>
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Đối tượng</label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.category} onChange={e=>setAddForm({...addForm,category:e.target.value})} placeholder="VD: Hộ Nghèo, Khuyết Tật..."/></div>
                                    <div className="flex gap-2 justify-end pt-4">
                                        <button onClick={()=>setShowAddModal(false)} className="px-5 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium">Hủy</button>
                                        <button onClick={handleAddPerson} className="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-purple-700">Thêm ngay</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DUPLICATE MODAL */}
                    {showDupModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col">
                                <div className="p-4 bg-orange-50 border-b border-orange-100 rounded-t-2xl flex justify-between items-center">
                                    <span className="font-bold text-orange-700 flex items-center gap-2"><Icon name="alert-triangle" size={20}/> Phát hiện {duplicateGroups.length} nhóm trùng</span>
                                    <button onClick={()=>setShowDupModal(false)} className="p-1 rounded hover:bg-orange-100 text-orange-600"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="overflow-y-auto p-4 flex-1 space-y-4 bg-slate-50">
                                    {duplicateGroups.map((g,i) => (
                                        <div key={i} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                                            <div className="font-bold text-sm mb-3 text-slate-800 border-b pb-2">Nhóm tên: "{g[0].name}"</div>
                                            <div className="space-y-2">
                                                {g.map(p => (
                                                    <div key={p.id} className="flex justify-between items-center text-sm bg-slate-50 p-2 rounded-lg">
                                                        <div className="flex flex-col"><span className="font-mono text-xs text-blue-600 font-bold">{p.personalId}</span><span className="text-slate-600 text-xs">{p.address}</span></div>
                                                        <div className="flex gap-2">
                                                            <button onClick={()=>openEditModal(p)} className="text-blue-600 bg-blue-50 p-1.5 rounded hover:bg-blue-100"><Icon name="edit-2" size={14}/></button>
                                                            <button onClick={()=>handleDeletePerson(p.id)} className="text-red-600 bg-red-50 p-1.5 rounded hover:bg-red-100"><Icon name="trash" size={14}/></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AUTH MODAL (đăng nhập tùy chọn để đồng bộ) */}
                    {showQrModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
                                <button onClick={()=>setShowQrModal(null)} className="float-right p-1 text-slate-400 hover:bg-slate-100 rounded"><Icon name="x" size={18}/></button>
                                <h3 className="font-bold text-lg text-slate-800 mt-4">{showQrModal.name}</h3>
                                <p className="text-xs text-slate-400 font-mono mb-4">{showQrModal.personalId}</p>
                                <img className="mx-auto border rounded-xl p-3 bg-white" alt="QR" width="220" height="220" src={`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(showQrModal.personalId)}`}/>
                                <p className="text-xs text-slate-500 mt-4">{showQrModal.address} · {showQrModal.category}</p>
                            </div>
                        </div>
                    )}

                    {showTrashModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
                                <div className="p-4 border-b flex justify-between items-center"><h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="archive-restore" size={20}/>Thùng rác</h3><button onClick={()=>setShowTrashModal(false)} className="p-2 hover:bg-slate-100 rounded-xl"><Icon name="x" size={20}/></button></div>
                                <div className="overflow-y-auto p-4 space-y-5">
                                    <div><h4 className="font-bold text-sm text-slate-500 uppercase mb-2">Người dân</h4>{trashPeople.length === 0 && <p className="text-sm text-slate-400">Không có người dân đã xóa.</p>}{trashPeople.map(p=><div key={p.id} className="flex items-center gap-3 p-3 border rounded-xl mb-2"><div className="flex-1 min-w-0"><p className="font-semibold truncate">{p.name}</p><p className="text-xs text-slate-400 truncate">{p.personalId} · {p.address}</p></div><button onClick={()=>restorePerson(p.id)} className="bg-green-50 text-green-700 px-3 py-2 rounded-lg text-xs font-bold">Khôi phục</button></div>)}</div>
                                    <div><h4 className="font-bold text-sm text-slate-500 uppercase mb-2">Đợt phát</h4>{trashWaves.length === 0 && <p className="text-sm text-slate-400">Không có đợt phát đã xóa.</p>}{trashWaves.map(w=><div key={w.id} className="flex items-center gap-3 p-3 border rounded-xl mb-2"><div className="flex-1 min-w-0"><p className="font-semibold truncate">{w.name}</p><p className="text-xs text-slate-400">{w.count} suất · {w.date}</p></div><button onClick={()=>restoreWave(w.id)} className="bg-green-50 text-green-700 px-3 py-2 rounded-lg text-xs font-bold">Khôi phục</button></div>)}</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAuditModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
                                <div className="p-4 border-b flex justify-between items-center"><h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="clipboard-list" size={20}/>Nhật ký thao tác</h3><button onClick={()=>setShowAuditModal(false)} className="p-2 hover:bg-slate-100 rounded-xl"><Icon name="x" size={20}/></button></div>
                                <div className="overflow-y-auto divide-y">
                                    {auditLogs.length === 0 && <p className="p-6 text-center text-slate-400">Chưa có nhật ký.</p>}
                                    {auditLogs.map(log=><div key={log.id} className="p-4 flex gap-3"><Icon name="history" size={17} className="text-slate-400 mt-0.5"/><div className="flex-1"><p className="font-semibold text-sm text-slate-800">{log.detail || log.action}</p><p className="text-xs text-slate-400">{new Date(log.at).toLocaleString('vi-VN')} · {log.actor} · {log.role}</p></div><span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded h-fit">{log.action}</span></div>)}
                                </div>
                            </div>
                        </div>
                    )}

                    {showAuthModal && !currentUser && (
                        <AuthScreen
                            onAuthSuccess={(user) => { setCurrentUser(user); setShowAuthModal(false); }}
                            onClose={() => setShowAuthModal(false)}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
