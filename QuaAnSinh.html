    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc, query, orderBy }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASIILX-To5Y4v0NbDlVwRqfXfy2sxFDUE",
            authDomain: "qua-an-sinh.firebaseapp.com",
            projectId: "qua-an-sinh",
            storageBucket: "qua-an-sinh.firebasestorage.app",
            messagingSenderId: "126012039754",
            appId: "1:126012039754:web:06fbb037254f51237a3cb3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Expose to global scope for React (Babel/UMD)
        window._firebaseAuth = auth;
        window._firebaseDb = db;
        window._firebaseFns = {
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged,
            collection, getDocs, setDoc, doc, deleteDoc, query, orderBy
        };
        window._firebaseReady = true;
        // Dispatch after a microtask tick so listeners in Babel scripts can register first
        setTimeout(() => window.dispatchEvent(new Event('firebaseReady')), 0);
    </script>

    <script>
        tailwind.config = {

                    }

        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

<body>
    <div id="root"></div>

    <!-- PWA Service Worker Registration -->
    <script>
    // Chỉ đăng ký khi chạy qua http(s) (localhost hoặc hosting), bỏ qua khi mở bằng file://
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }
    </script>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // ═══════════════════════════════════════════════════════
        // FIREBASE HELPERS
        // ═══════════════════════════════════════════════════════
        const waitForFirebase = () => new Promise(resolve => {
            if (window._firebaseReady) return resolve();
            window.addEventListener('firebaseReady', resolve, { once: true });
        });

        const fbAuth = () => window._firebaseAuth;
        const fbDb = () => window._firebaseDb;
        const fns = () => window._firebaseFns;

        // Firestore helpers
        const fsGetAll = async (col) => {
            const { collection, getDocs, query, orderBy } = fns();
            const q = query(collection(fbDb(), col), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            return snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
        };

        const fsUpsert = async (col, id, data) => {
            const { doc, setDoc } = fns();
            await setDoc(doc(fbDb(), col, id), data, { merge: true });
        };

        const fsDelete = async (col, id) => {
            const { doc, deleteDoc } = fns();
            await deleteDoc(doc(fbDb(), col, id));
        };

        // Xóa toàn bộ documents trong 1 collection trên Firestore
        const fsClearCollection = async (col) => {
            const { collection, getDocs, doc, deleteDoc } = fns();
            const snap = await getDocs(collection(fbDb(), col));
            await Promise.all(snap.docs.map(d => deleteDoc(doc(fbDb(), col, d.id))));
        };

        // ═══════════════════════════════════════════════════════
        // ICON COMPONENT
        // ═══════════════════════════════════════════════════════
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = '';
                    const el = document.createElement('i');
                    el.setAttribute('data-lucide', name);
                    el.setAttribute('width', size);
                    el.setAttribute('height', size);
                    if (className) el.setAttribute('class', className);
                    containerRef.current.appendChild(el);
                    if (window.lucide.createIcons) window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center shrink-0" style={{ width: size, height: size }}></span>;
        };

        // ═══════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════
        const generateID = () => `083${Math.floor(Math.random() * 1000000000).toString().padStart(9, '0')}`;
        const shuffleArray = (arr) => { for (let i = arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; };
        const readJson = (key, fallback) => {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch {
                return fallback;
            }
        };
        const normalizeText = (value) => String(value || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/đ/g, 'd')
            .replace(/Đ/g, 'D')
            .toLowerCase();
        const DELETED_WAVES_KEY = 'charity_deleted_waves';
        const getDeletedWaveIds = () => new Set(readJson(DELETED_WAVES_KEY, []));
        const saveDeletedWaveIds = (ids) => localStorage.setItem(DELETED_WAVES_KEY, JSON.stringify([...ids]));
        const markDeletedWaves = (ids) => {
            const deleted = getDeletedWaveIds();
            ids.filter(Boolean).forEach(id => deleted.add(id));
            saveDeletedWaveIds(deleted);
        };
        const ACTIVE_ROLE_KEY = 'charity_active_role';
        const AUDIT_KEY = 'charity_audit_logs';
        const TRASH_PEOPLE_KEY = 'charity_trash_people';
        const TRASH_WAVES_KEY = 'charity_trash_waves';
        const getDuplicateGroups = (list) => {
            const groups = {};
            list.forEach(p => { const k = (p.name||'').trim().toLowerCase(); if(!groups[k]) groups[k]=[]; groups[k].push(p); });
            return Object.values(groups).filter(g => g.length > 1);
        };

        // ═══════════════════════════════════════════════════════
        // TOAST COMPONENT
        // ═══════════════════════════════════════════════════════
        const Toast = ({ toasts }) => (
            <div className="toast">
                {toasts.map(t => (
                    <div key={t.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-white font-medium text-sm mb-2
                        ${t.type === 'success' ? 'bg-green-600' : t.type === 'error' ? 'bg-red-600' : t.type === 'warning' ? 'bg-amber-500' : 'bg-slate-800'}`}>
                        <Icon name={t.type==='success'?'check-circle':t.type==='error'?'x-circle':t.type==='warning'?'alert-triangle':'info'} size={18}/>
                        {t.msg}
                    </div>
                ))}
            </div>
        );

        // ═══════════════════════════════════════════════════════
        // CHART COMPONENTS
        // ═══════════════════════════════════════════════════════
        const SimplePieChart = ({ data, colors }) => {
            let cumPct = 0;
            const total = data.reduce((s, i) => s + i.value, 0);
            if (total === 0) return <div className="text-gray-400 text-xs text-center p-4">Chưa có dữ liệu</div>;
            return (
                <div className="relative w-32 h-32 md:w-40 md:h-40 mx-auto">
                    <svg viewBox="-1 -1 2 2" className="transform -rotate-90 w-full h-full">
                        {data.map((item, i) => {
                            const sp = cumPct, sl = item.value/total;
                            cumPct += sl;
                            const sx = Math.cos(2*Math.PI*sp), sy = Math.sin(2*Math.PI*sp);
                            const ex = Math.cos(2*Math.PI*cumPct), ey = Math.sin(2*Math.PI*cumPct);
                            const laf = sl > 0.5 ? 1 : 0;
                            const d = sl === 1 ? `M 0 0 L 1 0 A 1 1 0 1 1 1 -0.0001 L 0 0` : `M 0 0 L ${sx} ${sy} A 1 1 0 ${laf} 1 ${ex} ${ey} L 0 0`;
                            return <path key={i} d={d} fill={colors[i]} stroke="white" strokeWidth="0.02"/>;
                        })}
                    </svg>
                </div>
            );
        };

        const SimpleBarChart = ({ data }) => {
            const [hovered, setHovered] = React.useState(null);
            const [mounted, setMounted] = React.useState(false);
            React.useEffect(() => { const t = setTimeout(() => setMounted(true), 80); return () => clearTimeout(t); }, []);

            if (data.length === 0) return (
                <div className="flex flex-col items-center justify-center py-10 gap-3 text-slate-400">
                    <span style={{fontSize:'2.5rem'}}>📊</span>
                    <p className="text-sm font-medium">Chưa có dữ liệu địa bàn</p>
                </div>
            );

            const maxVal = Math.max(...data.map(d => d.value));
            const totalAll = data.reduce((s, d) => s + d.value, 0);
            const medals = ['🥇','🥈','🥉'];
            const palette = [
                {main:'#6366f1',light:'#e0e7ff',text:'#4338ca'},
                {main:'#0ea5e9',light:'#e0f2fe',text:'#0369a1'},
                {main:'#10b981',light:'#d1fae5',text:'#065f46'},
                {main:'#f59e0b',light:'#fef3c7',text:'#92400e'},
                {main:'#ef4444',light:'#fee2e2',text:'#991b1b'},
                {main:'#8b5cf6',light:'#ede9fe',text:'#5b21b6'},
                {main:'#ec4899',light:'#fce7f3',text:'#9d174d'},
                {main:'#14b8a6',light:'#ccfbf1',text:'#134e4a'},
                {main:'#f97316',light:'#ffedd5',text:'#9a3412'},
                {main:'#84cc16',light:'#ecfccb',text:'#3f6212'},
            ];

            return (
                <div>
                    {/* Summary pills */}
                    <div className="flex gap-2 mb-4 flex-wrap">
                        <div className="bg-slate-100 rounded-full px-3 py-1 text-xs font-bold text-slate-600">{data.length} địa bàn</div>
                        <div className="bg-amber-100 rounded-full px-3 py-1 text-xs font-bold text-amber-700">⏳ {data.reduce((s,d)=>s+d.waiting,0)} chưa nhận</div>
                        <div className="bg-green-100 rounded-full px-3 py-1 text-xs font-bold text-green-700">✓ {data.reduce((s,d)=>s+d.received,0)} đã nhận</div>
                    </div>

                    <div className="space-y-3">
                        {data.map((item, i) => {
                            const clr = palette[i % palette.length];
                            const pct = totalAll > 0 ? Math.round((item.value / totalAll) * 100) : 0;
                            const recPct = item.value > 0 ? Math.round((item.received / item.value) * 100) : 0;
                            const waitPct = 100 - recPct;
                            const barW = mounted ? Math.max(6, Math.round((item.value / maxVal) * 100)) : 0;
                            const recBarW = item.value > 0 ? (item.received / item.value) * barW : 0;
                            const isHov = hovered === i;
                            return (
                                <div key={i}
                                    onMouseEnter={() => setHovered(i)}
                                    onMouseLeave={() => setHovered(null)}
                                    style={{
                                        background: isHov ? clr.light : 'transparent',
                                        borderRadius: '12px',
                                        padding: '8px 10px',
                                        transition: 'background 0.2s',
                                        cursor: 'default',
                                        border: isHov ? `1.5px solid ${clr.main}33` : '1.5px solid transparent'
                                    }}
                                >
                                    {/* Row header */}
                                    <div className="flex items-center gap-2 mb-1.5">
                                        <span className="text-sm shrink-0">{i < 3 ? medals[i] : <span className="w-5 h-5 rounded-full inline-flex items-center justify-center text-[10px] font-bold" style={{background:clr.light,color:clr.text}}>#{i+1}</span>}</span>
                                        <span className="font-bold text-sm text-slate-700 flex-1 truncate" title={item.label}>{item.label || 'Chưa rõ'}</span>
                                        <span className="text-xs font-extrabold shrink-0" style={{color: clr.main}}>{item.value} người</span>
                                        <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full shrink-0">{pct}%</span>
                                    </div>

                                    {/* Stacked bar */}
                                    <div className="relative h-4 rounded-full overflow-hidden" style={{background:'#f1f5f9'}}>
                                        {/* Waiting segment */}
                                        <div style={{
                                            position:'absolute', inset:'0 0 0 0',
                                            width: `${barW}%`,
                                            background: `linear-gradient(90deg, ${clr.main}cc, ${clr.main}88)`,
                                            borderRadius:'9999px',
                                            transition:'width 0.7s cubic-bezier(0.34,1.56,0.64,1)',
                                        }}/>
                                        {/* Received segment (green) on top-left */}
                                        {item.received > 0 && (
                                            <div style={{
                                                position:'absolute', inset:'0 0 0 0',
                                                width: `${recBarW}%`,
                                                background:'linear-gradient(90deg,#16a34a,#22c55e)',
                                                borderRadius:'9999px',
                                                transition:'width 0.9s cubic-bezier(0.34,1.56,0.64,1)',
                                            }}/>
                                        )}
                                        {/* Value label inside */}
                                        {item.received > 0 && recBarW > 14 && (
                                            <span style={{position:'absolute',left:'6px',top:'50%',transform:'translateY(-50%)',fontSize:'9px',fontWeight:'bold',color:'white',textShadow:'0 1px 2px rgba(0,0,0,0.3)'}}>✓{item.received}</span>
                                        )}
                                    </div>

                                    {/* Detail row on hover */}
                                    <div style={{
                                        maxHeight: isHov ? '40px' : '0px',
                                        overflow: 'hidden',
                                        transition: 'max-height 0.25s ease',
                                        marginTop: isHov ? '6px' : '0',
                                    }}>
                                        <div className="flex gap-3 flex-wrap">
                                            <span style={{fontSize:'10px',display:'flex',alignItems:'center',gap:'4px'}}>
                                                <span style={{width:'8px',height:'8px',borderRadius:'50%',background:'#22c55e',display:'inline-block'}}></span>
                                                <span className="text-slate-600">Đã nhận: <b style={{color:'#16a34a'}}>{item.received}</b></span>
                                            </span>
                                            <span style={{fontSize:'10px',display:'flex',alignItems:'center',gap:'4px'}}>
                                                <span style={{width:'8px',height:'8px',borderRadius:'50%',background:'#f59e0b',display:'inline-block'}}></span>
                                                <span className="text-slate-600">Chưa nhận: <b style={{color:'#d97706'}}>{item.waiting}</b></span>
                                            </span>
                                            {/* Mini progress */}
                                            <span style={{fontSize:'10px',marginLeft:'auto',display:'flex',alignItems:'center',gap:'4px'}}>
                                                <span className="text-slate-400">Tỉ lệ:</span>
                                                <b style={{color: recPct >= 80 ? '#16a34a' : recPct >= 40 ? '#d97706' : '#dc2626'}}>{recPct}%</b>
                                                <span style={{
                                                    display:'inline-block',width:'28px',height:'4px',borderRadius:'4px',
                                                    background:'#e2e8f0',position:'relative',overflow:'hidden'
                                                }}>
                                                    <span style={{
                                                        position:'absolute',inset:'0',width:`${recPct}%`,
                                                        background: recPct >= 80 ? '#22c55e' : recPct >= 40 ? '#f59e0b' : '#ef4444',
                                                        borderRadius:'4px'
                                                    }}></span>
                                                </span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Legend footer */}
                    <div style={{display:'flex',gap:'16px',flexWrap:'wrap',paddingTop:'10px',marginTop:'4px',borderTop:'1px solid #e2e8f0'}}>
                        <span style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'10px',color:'#64748b'}}>
                            <span style={{width:'10px',height:'6px',borderRadius:'3px',background:'linear-gradient(90deg,#16a34a,#22c55e)',display:'inline-block'}}></span>Đã nhận
                        </span>
                        <span style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'10px',color:'#64748b'}}>
                            <span style={{width:'10px',height:'6px',borderRadius:'3px',background:'linear-gradient(90deg,#6366f1,#818cf8)',display:'inline-block'}}></span>Tổng địa bàn
                        </span>
                        <span style={{marginLeft:'auto',fontSize:'10px',color:'#94a3b8'}}>Hover để xem chi tiết</span>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════
        // AUTH SCREEN
        // ═══════════════════════════════════════════════════════
        const AuthScreen = ({ onAuthSuccess, onClose }) => {
            const [showRegister, setShowRegister] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [showPass, setShowPass] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');

            const mapError = (code) => {
                const m = {
                    'auth/invalid-email': 'Email không hợp lệ.',
                    'auth/user-not-found': 'Tài khoản không tồn tại.',
                    'auth/wrong-password': 'Mật khẩu không đúng.',
                    'auth/invalid-credential': 'Email hoặc mật khẩu không đúng.',
                    'auth/email-already-in-use': 'Email này đã được đăng ký.',
                    'auth/weak-password': 'Mật khẩu quá yếu (tối thiểu 6 ký tự).',
                    'auth/too-many-requests': 'Quá nhiều lần thử. Vui lòng thử lại sau.',
                    'auth/network-request-failed': 'Lỗi kết nối mạng.',
                };
                return m[code] || 'Có lỗi xảy ra, vui lòng thử lại.';
            };

            const handleLogin = async () => {
                if (!email || !password) return setError('Vui lòng nhập đầy đủ thông tin!');
                setLoading(true); setError(''); setSuccess('');
                try {
                    await waitForFirebase();
                    const { signInWithEmailAndPassword } = fns();
                    if (!signInWithEmailAndPassword) throw new Error('Firebase chưa sẵn sàng, vui lòng thử lại.');
                    const cred = await signInWithEmailAndPassword(fbAuth(), email.trim(), password);
                    onAuthSuccess(cred.user);
                } catch(e) {
                    setError(e.code ? mapError(e.code) : (e.message || 'Có lỗi xảy ra, vui lòng thử lại.'));
                } finally { setLoading(false); }
            };

            const handleRegister = async () => {
                if (!email || !password || !confirmPassword) return setError('Vui lòng nhập đầy đủ thông tin!');
                if (password !== confirmPassword) return setError('Mật khẩu xác nhận không khớp!');
                if (password.length < 6) return setError('Mật khẩu tối thiểu 6 ký tự!');
                setLoading(true); setError(''); setSuccess('');
                try {
                    await waitForFirebase();
                    const { createUserWithEmailAndPassword } = fns();
                    if (!createUserWithEmailAndPassword) throw new Error('Firebase chưa sẵn sàng, vui lòng thử lại.');
                    const cred = await createUserWithEmailAndPassword(fbAuth(), email.trim(), password);
                    setSuccess('Đăng ký thành công! Đang đăng nhập...');
                    setTimeout(() => onAuthSuccess(cred.user), 1000);
                } catch(e) {
                    setError(e.code ? mapError(e.code) : (e.message || 'Có lỗi xảy ra, vui lòng thử lại.'));
                } finally { setLoading(false); }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') showRegister ? handleRegister() : handleLogin();
            };

            const switchMode = (toRegister) => {
                setShowRegister(toRegister);
                setError(''); setSuccess('');
                setPassword(''); setConfirmPassword('');
            };

            return (
                <div className="auth-bg flex items-center justify-center p-4 min-h-screen fixed inset-0 z-[300] overflow-y-auto">
                    <div className="auth-card rounded-3xl w-full max-w-md p-8 animate-fade-in relative my-auto">
                        {onClose && (
                            <button onClick={onClose} aria-label="Đóng"
                                className="absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors">
                                <Icon name="x" size={20}/>
                            </button>
                        )}
                        {/* Logo */}
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-3xl shadow-xl shadow-blue-200 mb-4">
                                <span style={{fontSize:'2.5rem'}}>🎁</span>
                            </div>
                            <h1 className="text-2xl font-extrabold text-slate-900">Quà An Sinh</h1>
                            <p className="text-slate-400 text-sm mt-1">
                                {showRegister ? 'Tạo tài khoản mới' : 'Đăng nhập để tiếp tục'}
                            </p>
                        </div>

                        {/* Error / Success */}
                        {error && (
                            <div className="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-4 text-sm animate-fade-in">
                                <span>⚠️</span><span>{error}</span>
                            </div>
                        )}
                        {success && (
                            <div className="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-4 text-sm animate-fade-in">
                                <span>✅</span><span>{success}</span>
                            </div>
                        )}

                        {/* Fields */}
                        <div className="space-y-4">
                            {/* Email */}
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Email</label>
                                <div className="relative">
                                    <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                        <Icon name="mail" size={16}/>
                                    </span>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={e=>setEmail(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        placeholder="your@email.com"
                                        className="auth-input w-full border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm bg-slate-50 text-slate-800 transition-all"
                                    />
                                </div>
                            </div>

                            {/* Password */}
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Mật khẩu</label>
                                <div className="relative">
                                    <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                        <Icon name="lock" size={16}/>
                                    </span>
                                    <input
                                        type={showPass ? 'text' : 'password'}
                                        value={password}
                                        onChange={e=>setPassword(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        placeholder="Tối thiểu 6 ký tự"
                                        className="auth-input w-full border border-slate-200 rounded-xl py-3 pl-10 pr-12 text-sm bg-slate-50 text-slate-800 transition-all"
                                    />
                                    <button onClick={()=>setShowPass(!showPass)}
                                        className="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <Icon name={showPass?'eye-off':'eye'} size={16}/>
                                    </button>
                                </div>
                            </div>

                            {/* Confirm Password (register only) */}
                            {showRegister && (
                                <div className="animate-fade-in">
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Xác nhận mật khẩu</label>
                                    <div className="relative">
                                        <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                            <Icon name="shield-check" size={16}/>
                                        </span>
                                        <input
                                            type={showPass ? 'text' : 'password'}
                                            value={confirmPassword}
                                            onChange={e=>setConfirmPassword(e.target.value)}
                                            onKeyDown={handleKeyDown}
                                            placeholder="Nhập lại mật khẩu"
                                            className="auth-input w-full border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm bg-slate-50 text-slate-800 transition-all"
                                        />
                                    </div>
                                </div>
                            )}

                            {/* Submit */}
                            <button
                                onClick={showRegister ? handleRegister : handleLogin}
                                disabled={loading}
                                className="auth-btn-primary w-full text-white font-bold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2 mt-2 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none">
                                {loading
                                    ? <><Icon name="loader-2" size={18} className="animate-spin"/> Đang xử lý...</>
                                    : !showRegister
                                        ? <><Icon name="log-in" size={18}/> Đăng nhập</>
                                        : <><Icon name="user-plus" size={18}/> Tạo tài khoản</>
                                }
                            </button>
                        </div>

                        {/* Switch hint */}
                        <div className="mt-6 pt-5 border-t border-slate-100 text-center">
                            {!showRegister ? (
                                <p className="text-xs text-slate-400">
                                    Chưa có tài khoản?{' '}
                                    <button onClick={()=>switchMode(true)} className="text-blue-600 font-semibold hover:underline">
                                        Đăng ký tài khoản mới
                                    </button>
                                </p>
                            ) : (
                                <p className="text-xs text-slate-400">
                                    Đã có tài khoản?{' '}
                                    <button onClick={()=>switchMode(false)} className="text-blue-600 font-semibold hover:underline">
                                        ← Quay lại đăng nhập
                                    </button>
                                </p>
                            )}
                            <p className="text-[11px] text-slate-300 mt-3">🔒 Bảo mật bởi Google Firebase Authentication</p>
                            <p className="text-[11px] text-slate-300 mt-1">Quà An Sinh v4.0 · Phần mềm nội bộ</p>
                        </div>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════
        // MAIN APP
        // ═══════════════════════════════════════════════════════
        const App = () => {
            // --- AUTH STATE ---
            const [currentUser, setCurrentUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);

            // --- APP STATE ---
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [people, setPeople] = useState([]);
            const [waves, setWaves] = useState([]);
            const [trashPeople, setTrashPeople] = useState(() => readJson(TRASH_PEOPLE_KEY, []));
            const [trashWaves, setTrashWaves] = useState(() => readJson(TRASH_WAVES_KEY, []));
            const [auditLogs, setAuditLogs] = useState(() => readJson(AUDIT_KEY, []));
            const [activeRole, setActiveRole] = useState(() => localStorage.getItem(ACTIVE_ROLE_KEY) || 'admin');
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState('local');
            const [toasts, setToasts] = useState([]);
            const [pwaInstallEvent, setPwaInstallEvent] = useState(null);
            const [showPwaBanner, setShowPwaBanner] = useState(false);

            // Modal States
            const [viewingWave, setViewingWave] = useState(null);
            const [showDupModal, setShowDupModal] = useState(false);
            const [duplicateGroups, setDuplicateGroups] = useState([]);
            const [editingPerson, setEditingPerson] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [showAddModal, setShowAddModal] = useState(false);
            const [addForm, setAddForm] = useState({ name: '', personalId: '', address: '', category: 'Hộ Thường' });
            const [distForm, setDistForm] = useState({
                name: '', date: new Date().toISOString().split('T')[0],
                quantity: 10, filterAddress: 'all', filterCategory: 'all'
            });

            // ── SEARCH & MANUAL SELECTION ──
            const [importSearch, setImportSearch] = useState('');
            const [importSearchName, setImportSearchName] = useState('');
            const [importSearchCategory, setImportSearchCategory] = useState('');
            const [importSearchAddress, setImportSearchAddress] = useState('');
            const [waveMode, setWaveMode] = useState('auto'); // 'auto' | 'manual'
            const [manualSearch, setManualSearch] = useState('');
            const [manualSelected, setManualSelected] = useState([]);
            const [checkinCode, setCheckinCode] = useState('');
            const [reportFilters, setReportFilters] = useState({ status: 'all', address: 'all', category: 'all', query: '' });

            const [showAuthModal, setShowAuthModal] = useState(false);
            const [showTrashModal, setShowTrashModal] = useState(false);
            const [showAuditModal, setShowAuditModal] = useState(false);
            const [showQrModal, setShowQrModal] = useState(null);
            const [editingWave, setEditingWave] = useState(null);
            const [editWaveForm, setEditWaveForm] = useState({});
            const fileInputRef = useRef(null);

            // ── TOAST HELPER ──
            const showToast = useCallback((msg, type='info', duration=3000) => {
                const id = Date.now();
                setToasts(t => [...t, { id, msg, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), duration);
            }, []);
            const canManage = activeRole === 'admin';
            const addAudit = useCallback((action, detail = '') => {
                const entry = {
                    id: `A${Date.now()}${Math.floor(Math.random() * 1000)}`,
                    at: new Date().toISOString(),
                    actor: currentUser?.email || 'Máy này',
                    role: activeRole,
                    action,
                    detail
                };
                setAuditLogs(prev => [entry, ...prev].slice(0, 300));
            }, [activeRole, currentUser]);
            const requireAdmin = () => {
                if (canManage) return true;
                showToast('Vai trò hiện tại chỉ được check-in và xem dữ liệu.', 'warning');
                return false;
            };

            // ── PWA INSTALL PROMPT ──
            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setPwaInstallEvent(e); setShowPwaBanner(true); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstallPWA = async () => {
                if (!pwaInstallEvent) return;
                pwaInstallEvent.prompt();
                const { outcome } = await pwaInstallEvent.userChoice;
                if (outcome === 'accepted') { setShowPwaBanner(false); showToast('Đã cài đặt ứng dụng!', 'success'); }
            };

            // ── FIREBASE AUTH LISTENER ──
            useEffect(() => {
                let unsub = null;
                waitForFirebase().then(() => {
                    const { onAuthStateChanged } = fns();
                    unsub = onAuthStateChanged(fbAuth(), (user) => {
                        setCurrentUser(user);
                        setAuthLoading(false);
                    });
                }).catch(() => {
                    setAuthLoading(false);
                });
                // Fallback: nếu firebase không load được sau 5 giây
                const fallback = setTimeout(() => setAuthLoading(false), 5000);
                return () => { if (unsub) unsub(); clearTimeout(fallback); };
            }, []);

            // ── FIREBASE SYNC FUNCTIONS ──
            const syncFromFirebase = useCallback(async () => {
                if (!currentUser) return;
                setSyncStatus('syncing');
                try {
                    const [pData, wData] = await Promise.all([
                        fsGetAll(`users/${currentUser.uid}/people`),
                        fsGetAll(`users/${currentUser.uid}/waves`)
                    ]);
                    const mappedPeople = pData.map(p => ({
                        id: p.id, personalId: p.personalId, name: p.name,
                        address: p.address, category: p.category,
                        status: p.status, waveId: p.waveId, createdAt: p.createdAt
                    }));
                    const deletedWaveIds = getDeletedWaveIds();
                    if (deletedWaveIds.size) {
                        Promise.all([...deletedWaveIds].map(id => fsDelete(`users/${currentUser.uid}/waves`, id))).catch(() => {});
                    }
                    const mappedWaves = wData.map(w => ({
                        id: w.id, name: w.name, date: w.date,
                        count: w.count, criteria: w.criteria,
                        recipients: typeof w.recipients === 'string' ? JSON.parse(w.recipients) : (w.recipients || []),
                        createdAt: w.createdAt
                    })).filter(w => !deletedWaveIds.has(w.id));
                    // Gộp dữ liệu offline (nhập khi chưa đăng nhập) với dữ liệu đám mây.
                    // Giữ lại các mục cục bộ chưa có trên cloud; auto-save sẽ tự đẩy lên.
                    const localPeople = readJson('charity_people', []);
                    const localWaves = readJson('charity_waves', []);
                    const cloudPIds = new Set(mappedPeople.map(p => p.id));
                    const cloudWIds = new Set(mappedWaves.map(w => w.id));
                    const extraPeople = (Array.isArray(localPeople) ? localPeople : []).filter(p => p && p.id && !cloudPIds.has(p.id));
                    const extraWaves = (Array.isArray(localWaves) ? localWaves : []).filter(w => w && w.id && !cloudWIds.has(w.id) && !deletedWaveIds.has(w.id));
                    const finalPeople = [...mappedPeople, ...extraPeople];
                    const finalWaves = [...mappedWaves, ...extraWaves];
                    setPeople(finalPeople);
                    setWaves(finalWaves);
                    localStorage.setItem('charity_people', JSON.stringify(finalPeople));
                    localStorage.setItem('charity_waves', JSON.stringify(finalWaves));
                    setSyncStatus('synced');
                    const extraMsg = extraPeople.length ? ` (+${extraPeople.length} từ máy này)` : '';
                    showToast(`Đã đồng bộ ${finalPeople.length} người${extraMsg}`, 'success');
                } catch(e) {
                    setSyncStatus('error');
                    showToast('Lỗi tải dữ liệu: ' + e.message, 'error');
                }
            }, [currentUser, showToast]);

            const syncToFirebase = useCallback(async (newPeople, newWaves) => {
                if (!currentUser) return;
                setSyncStatus('syncing');
                try {
                    const ps = newPeople || people;
                    const ws = newWaves || waves;
                    await Promise.all([
                        ...ps.map(p => fsUpsert(`users/${currentUser.uid}/people`, p.id, {
                            id: p.id, personalId: p.personalId, name: p.name,
                            address: p.address, category: p.category,
                            status: p.status, waveId: p.waveId || null, createdAt: p.createdAt
                        })),
                        ...ws.map(w => fsUpsert(`users/${currentUser.uid}/waves`, w.id, {
                            id: w.id, name: w.name, date: w.date,
                            count: w.count, criteria: w.criteria,
                            recipients: w.recipients, createdAt: w.createdAt
                        }))
                    ]);
                    setSyncStatus('synced');
                } catch(e) {
                    setSyncStatus('error');
                    showToast('Lỗi đồng bộ: ' + e.message, 'error');
                }
            }, [currentUser, people, waves, showToast]);

            // ── INIT DATA ──
            useEffect(() => {
                const init = async () => {
                    setLoading(true);
                    const savedPeople = readJson('charity_people', null);
                    const savedWaves = readJson('charity_waves', null);
                    const deletedWaveIds = getDeletedWaveIds();
                    if (savedPeople) setPeople(savedPeople);
                    if (savedWaves) setWaves(savedWaves.filter(w => w && !deletedWaveIds.has(w.id)));
                    if (currentUser) {
                        await syncFromFirebase();
                    }
                    setLoading(false);
                };
                init();
            }, [currentUser]);

            // ── AUTO SAVE ──
            const saveTimeout = useRef(null);
            useEffect(() => {
                if (loading) return;
                localStorage.setItem('charity_people', JSON.stringify(people));
                localStorage.setItem('charity_waves', JSON.stringify(waves));
                if (currentUser) {
                    clearTimeout(saveTimeout.current);
                    saveTimeout.current = setTimeout(() => syncToFirebase(people, waves), 1500);
                }
            }, [people, waves, loading]);
            useEffect(() => { localStorage.setItem(TRASH_PEOPLE_KEY, JSON.stringify(trashPeople)); }, [trashPeople]);
            useEffect(() => { localStorage.setItem(TRASH_WAVES_KEY, JSON.stringify(trashWaves)); }, [trashWaves]);
            useEffect(() => { localStorage.setItem(AUDIT_KEY, JSON.stringify(auditLogs)); }, [auditLogs]);
            useEffect(() => { localStorage.setItem(ACTIVE_ROLE_KEY, activeRole); }, [activeRole]);

            useEffect(() => { setIsSidebarOpen(false); }, [activeTab]);

            // ── STATS ──
            const stats = useMemo(() => ({
                total: people.length,
                waiting: people.filter(p => p.status === 'waiting').length,
                received: people.filter(p => p.status === 'received').length,
                waves: waves.length
            }), [people, waves]);

            const sortedPeople = useMemo(() => [...people].sort((a,b) => (b.createdAt||0)-(a.createdAt||0)), [people]);
            const alphabeticalPeople = useMemo(() => [...people].sort((a,b) => String(a?.name ?? '').localeCompare(String(b?.name ?? ''), 'vi', {sensitivity:'base'})), [people]);
            const manualFilteredPeople = useMemo(() => {
                const q = normalizeText(manualSearch).trim();
                return alphabeticalPeople.filter(p => {
                    const name = normalizeText(p?.name);
                    const address = normalizeText(p?.address);
                    const category = normalizeText(p?.category);
                    const pid = normalizeText(p?.personalId);
                    return !q || name.includes(q) || address.includes(q) || category.includes(q) || pid.includes(q);
                });
            }, [alphabeticalPeople, manualSearch]);
            const filteredImportPeople = useMemo(() => {
                return alphabeticalPeople.filter(p => {
                    const name = normalizeText(p?.name);
                    const category = normalizeText(p?.category);
                    const address = normalizeText(p?.address);
                    const pid = normalizeText(p?.personalId);
                    const nameQ = normalizeText(importSearchName);
                    const catQ = normalizeText(importSearchCategory);
                    const addrQ = normalizeText(importSearchAddress);
                    const nameOk = !nameQ || name.includes(nameQ) || pid.includes(nameQ);
                    const catOk = !catQ || category.includes(catQ);
                    const addrOk = !addrQ || address.includes(addrQ);
                    return nameOk && catOk && addrOk;
                });
            }, [alphabeticalPeople, importSearchName, importSearchCategory, importSearchAddress]);
            const reportPeople = useMemo(() => {
                const q = normalizeText(reportFilters.query).trim();
                return alphabeticalPeople.filter(p => {
                    if (reportFilters.status !== 'all' && p.status !== reportFilters.status) return false;
                    if (reportFilters.address !== 'all' && p.address !== reportFilters.address) return false;
                    if (reportFilters.category !== 'all' && p.category !== reportFilters.category) return false;
                    const haystack = normalizeText(`${p.name} ${p.personalId} ${p.address} ${p.category}`);
                    return !q || haystack.includes(q);
                });
            }, [alphabeticalPeople, reportFilters]);
            const addressStats = useMemo(() => {
                const c = {};
                people.forEach(p => {
                    if (!c[p.address]) c[p.address] = { total: 0, received: 0, waiting: 0 };
                    c[p.address].total++;
                    if (p.status === 'received') c[p.address].received++;
                    else c[p.address].waiting++;
                });
                return Object.entries(c)
                    .map(([label, v]) => ({ label, value: v.total, received: v.received, waiting: v.waiting }))
                    .sort((a,b) => b.value - a.value)
                    .slice(0, 10);
            }, [people]);
            const uniqueAddresses = useMemo(() => [...new Set(people.map(p=>p.address))], [people]);
            const uniqueCategories = useMemo(() => [...new Set(people.map(p=>p.category))], [people]);

            // ── HANDLERS ──
            const handleBackup = () => {
                const data = { version: "4.1", exportDate: new Date().toISOString(), people, waves, trashPeople, trashWaves, auditLogs };
                const blob = new Blob([JSON.stringify(data,null,2)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `SaoLuu_QuaAnSinh_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                addAudit('backup', `Xuất sao lưu ${people.length} người, ${waves.length} đợt`);
                showToast('Đã xuất file sao lưu', 'success');
            };

            const handleRestore = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if(data.people && Array.isArray(data.people)) {
                            if(confirm(`Phục hồi ${data.people.length} người? Dữ liệu cũ sẽ mất.`)) {
                                localStorage.removeItem(DELETED_WAVES_KEY);
                                setPeople(data.people); setWaves(data.waves||[]);
                                setTrashPeople(data.trashPeople || []);
                                setTrashWaves(data.trashWaves || []);
                                setAuditLogs(data.auditLogs || []);
                                addAudit('restore', `Phục hồi ${data.people.length} người`);
                                showToast('Phục hồi thành công!', 'success');
                                setActiveTab('dashboard');
                            }
                        } else showToast('File không hợp lệ!', 'error');
                    } catch(err) { showToast('Lỗi đọc file!', 'error'); }
                    finally { e.target.value = null; }
                };
                reader.readAsText(file);
            };

            const handleExportExcel = () => {
                if (people.length === 0) return showToast('Chưa có dữ liệu!', 'warning');
                const data = sortedPeople.map((p,i) => ({
                    STT: i+1, 'Họ Tên': p.name, 'CCCD/ID': p.personalId,
                    'Địa Chỉ': p.address, 'Đối Tượng': p.category,
                    'Trạng Thái': p.status==='received'?'Đã nhận':'Chưa nhận',
                    'Đợt Gần Nhất': p.waveId ? (waves.find(w=>w.id===p.waveId)?.name||'') : ''
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "DanhSach");
                XLSX.writeFile(wb, `DanhSach_AnSinh_${new Date().toISOString().slice(0,10)}.xlsx`);
                addAudit('export', `Xuất Excel danh sách ${data.length} người`);
                showToast('Xuất Excel thành công!', 'success');
            };

            const handleExportReportExcel = () => {
                if (reportPeople.length === 0) return showToast('Không có dữ liệu để xuất!', 'warning');
                const data = reportPeople.map((p,i) => ({
                    STT: i+1, 'Họ Tên': p.name, 'CCCD/ID': p.personalId,
                    'Địa Chỉ': p.address, 'Đối Tượng': p.category,
                    'Trạng Thái': p.status==='received'?'Đã nhận':'Chưa nhận',
                    'Đợt Gần Nhất': p.waveId ? (waves.find(w=>w.id===p.waveId)?.name||'') : ''
                }));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "BaoCao");
                XLSX.writeFile(wb, `BaoCao_QuaAnSinh_${new Date().toISOString().slice(0,10)}.xlsx`);
                addAudit('report_export', `Xuất báo cáo ${data.length} dòng`);
                showToast('Đã xuất báo cáo Excel!', 'success');
            };

            const handleExportWaveExcel = (wave) => {
                const data = wave.recipients.map((p,i) => ({
                    STT: i+1, 'Họ Tên': p.name, 'CCCD/ID': p.personalId,
                    'Địa Chỉ': p.address, 'Đối Tượng': p.category, 'Ngày Nhận': wave.date
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "DanhSach");
                XLSX.writeFile(wb, `DS_Dot_${wave.name}.xlsx`);
                addAudit('wave_export', `Xuất Excel ${wave.name}`);
                showToast('Đã xuất Excel đợt phát!', 'success');
            };

            const handleAddPerson = () => {
                if (!requireAdmin()) return;
                if (!addForm.name) return showToast('Vui lòng nhập họ tên!', 'warning');
                const pid = addForm.personalId || generateID();
                const newPerson = { id: pid, personalId: pid, name: addForm.name, address: addForm.address||'Chưa rõ', category: addForm.category||'Hộ Thường', status: 'waiting', waveId: null, createdAt: Date.now() };
                if (people.some(p => p.personalId === pid)) {
                    if (!confirm("Mã ID này đã tồn tại. Bạn có chắc chắn muốn thêm?")) return;
                }
                setPeople(prev => [newPerson, ...prev]);
                setAddForm({ name: '', personalId: '', address: '', category: 'Hộ Thường' });
                setShowAddModal(false);
                addAudit('person_add', `Thêm ${newPerson.name}`);
                showToast('Đã thêm người mới!', 'success');
            };

            const handleFileUpload = (e) => {
                if (!requireAdmin()) { e.target.value = null; return; }
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        const map = new Map(people.map(p => [String(p.personalId), p]));
                        let countNew = 0;
                        data.forEach((item, idx) => {
                            const pid = String(item['CCCD']||item['CMND']||item['ID']||item['MaSo']||generateID());
                            const name = item['HoTen']||item['Họ Tên']||item['Name']||`Người ${idx}`;
                            const np = { id: pid, personalId: pid, name, address: item['DiaChi']||item['Địa Chỉ']||item['Address']||'Chưa rõ', category: item['DoiTuong']||item['Đối Tượng']||item['Category']||'Hộ Thường', status: 'waiting', waveId: null, createdAt: Date.now() };
                            if (map.has(pid)) { const old = map.get(pid); map.set(pid, {...np, status:old.status, waveId:old.waveId, createdAt:old.createdAt||Date.now()}); }
                            else { map.set(pid, np); countNew++; }
                        });
                        const updated = Array.from(map.values());
                        setPeople(updated);
                        addAudit('import_excel', `Nhập ${updated.length} người (+${countNew} mới)`);
                        const dups = getDuplicateGroups(updated);
                        if (dups.length > 0) { setDuplicateGroups(dups); setShowDupModal(true); }
                        else showToast(`Đã nhập ${updated.length} người! (+${countNew} mới)`, 'success');
                    } catch(err) { showToast('Lỗi file: ' + err.message, 'error'); }
                };
                reader.readAsBinaryString(file);
            };

            const handleScanDuplicates = () => {
                const dups = getDuplicateGroups(people);
                if (dups.length === 0) showToast('Không có trùng tên.', 'success');
                else { setDuplicateGroups(dups); setShowDupModal(true); }
            };

            const handleDeletePerson = (id) => {
                if (!requireAdmin()) return;
                const person = people.find(p => p.id === id);
                if(window.confirm("Xóa người này?")) {
                    if (person) setTrashPeople(prev => [{...person, deletedAt: Date.now()}, ...prev]);
                    setPeople(prev => prev.filter(p => p.id !== id));
                    setDuplicateGroups(prev => prev.map(g=>g.filter(p=>p.id!==id)).filter(g=>g.length>1));
                    if (currentUser) {
                        fsDelete(`users/${currentUser.uid}/people`, id)
                            .catch(e => showToast('Lỗi xóa trên đám mây: ' + e.message, 'error'));
                    }
                    addAudit('person_delete', `Xóa ${person?.name || id}`);
                }
            };

            const openEditModal = (person) => { setEditingPerson(person); setEditForm({...person}); };
            const handleSaveEdit = () => {
                if (!requireAdmin()) return;
                if (!editForm.name) return showToast('Thiếu tên!', 'warning');
                setPeople(prev => prev.map(p => p.id === editingPerson.id ? {...p,...editForm} : p));
                setEditingPerson(null);
                addAudit('person_edit', `Sửa ${editForm.name}`);
                showToast('Đã cập nhật thông tin!', 'success');
            };

            const loadMockData = () => {
                if (!requireAdmin()) return;
                const mock = Array.from({length:50}, (_,i) => ({
                    id: generateID(), personalId: generateID(),
                    name: `Người Mẫu ${i+1}`, address: `Thôn ${i%5+1}`,
                    category: ['Nghèo','Cận Nghèo'][i%2], status: 'waiting', waveId: null, createdAt: Date.now()
                }));
                setPeople(prev => [...prev, ...mock]);
                addAudit('mock_data', 'Thêm 50 người mẫu');
                showToast('Đã thêm 50 người mẫu!', 'info');
            };

            const handleCreateWave = () => {
                if (!requireAdmin()) return;
                if (!distForm.name) return showToast('Nhập tên đợt!', 'warning');
                let selected;
                if (waveMode === 'manual') {
                    if (manualSelected.length === 0) return showToast('Chưa chọn người nào!', 'warning');
                    const selSet = new Set(manualSelected);
                    selected = people.filter(p => selSet.has(p.id));
                } else {
                    let candidates = people.filter(p => p.status === 'waiting');
                    if (distForm.filterAddress !== 'all') candidates = candidates.filter(p => p.address === distForm.filterAddress);
                    if (distForm.filterCategory !== 'all') candidates = candidates.filter(p => p.category === distForm.filterCategory);
                    if (candidates.length === 0) return showToast('Không còn ai thỏa điều kiện!', 'warning');
                    if (distForm.filterAddress === 'all' && distForm.filterCategory === 'all') candidates = shuffleArray([...candidates]);
                    const qty = Math.min(parseInt(distForm.quantity), candidates.length);
                    selected = candidates.slice(0, qty);
                }
                const selIds = new Set(selected.map(p => p.id));
                const newWave = { id: `W${Date.now()}`, name: distForm.name, date: distForm.date, count: selected.length, criteria: waveMode === 'manual' ? 'Chọn tay' : `${distForm.filterAddress}/${distForm.filterCategory}`, recipients: selected, createdAt: Date.now() };
                setWaves(prev => [newWave, ...prev]);
                setPeople(prev => prev.map(p => selIds.has(p.id) ? {...p, status:'received', waveId:newWave.id} : p));
                setManualSelected([]);
                addAudit('wave_create', `Tạo ${newWave.name} (${selected.length} suất)`);
                showToast(`Đã tạo đợt ${selected.length} suất!`, 'success');
                setActiveTab('history');
                setViewingWave(newWave);
            };

            const handleDeleteWave = (waveId) => {
                if (!requireAdmin()) return;
                if (!window.confirm('Xóa đợt phát này? Trạng thái của những người trong đợt sẽ được reset về "Chưa nhận".')) return;
                const wave = waves.find(w => w.id === waveId);
                if (wave) {
                    setTrashWaves(prev => [{...wave, deletedAt: Date.now()}, ...prev]);
                    const recipientIds = new Set((wave.recipients||[]).map(p => p.id));
                    setPeople(prev => prev.map(p => recipientIds.has(p.id) ? {...p, status:'waiting', waveId:null} : p));
                }
                setWaves(prev => prev.filter(w => w.id !== waveId));
                markDeletedWaves([waveId]);
                if (viewingWave && viewingWave.id === waveId) setViewingWave(null);
                if (currentUser) {
                    fsDelete(`users/${currentUser.uid}/waves`, waveId)
                        .catch(e => showToast('Lỗi xóa trên đám mây: ' + e.message, 'error'));
                }
                showToast('Đã xóa đợt phát!', 'warning');
            };

            const openEditWaveModal = (wave) => {
                setEditingWave(wave);
                setEditWaveForm({ name: wave.name, date: wave.date });
            };

            const handleSaveEditWave = () => {
                if (!requireAdmin()) return;
                if (!editWaveForm.name) return showToast('Vui lòng nhập tên đợt!', 'warning');
                setWaves(prev => prev.map(w => w.id === editingWave.id ? {...w, name: editWaveForm.name, date: editWaveForm.date} : w));
                if (viewingWave && viewingWave.id === editingWave.id) {
                    setViewingWave(prev => ({...prev, name: editWaveForm.name, date: editWaveForm.date}));
                }
                setEditingWave(null);
                addAudit('wave_edit', `Sửa ${editWaveForm.name}`);
                showToast('Đã cập nhật đợt phát!', 'success');
            };

            const handleResetCampaign = () => {
                if (!requireAdmin()) return;
                const waveIdsToDelete = waves.map(w => w.id);
                if (confirm("Reset trạng thái 'Chưa nhận' cho tất cả?")) {
                    setTrashWaves(prev => [...waves.map(w => ({...w, deletedAt: Date.now()})), ...prev]);
                    setPeople(prev => prev.map(p => ({...p, status:'waiting', waveId:null})));
                    markDeletedWaves(waveIdsToDelete);
                    setWaves([]);
                    if (currentUser) {
                        fsClearCollection(`users/${currentUser.uid}/waves`)
                            .catch(e => showToast('Lỗi xóa đợt trên đám mây: ' + e.message, 'error'));
                    }
                    showToast('Đã reset mùa vụ mới!', 'info');
                }
            };

            const handleHardReset = () => {
                if (!requireAdmin()) return;
                const waveIdsToDelete = waves.map(w => w.id);
                if (confirm("XÓA SẠCH DỮ LIỆU?")) {
                    setTrashPeople(prev => [...people.map(p => ({...p, deletedAt: Date.now()})), ...prev]);
                    setTrashWaves(prev => [...waves.map(w => ({...w, deletedAt: Date.now()})), ...prev]);
                    markDeletedWaves(waveIdsToDelete);
                    setPeople([]); setWaves([]);
                    localStorage.removeItem('charity_people');
                    localStorage.removeItem('charity_waves');
                    if (currentUser) {
                        Promise.all([
                            fsClearCollection(`users/${currentUser.uid}/people`),
                            fsClearCollection(`users/${currentUser.uid}/waves`)
                        ]).catch(e => showToast('Lỗi xóa trên đám mây: ' + e.message, 'error'));
                    }
                    showToast('Đã xóa toàn bộ dữ liệu', 'warning');
                }
            };

            const restorePerson = (id) => {
                if (!requireAdmin()) return;
                const person = trashPeople.find(p => p.id === id);
                if (!person) return;
                const { deletedAt, ...restored } = person;
                setPeople(prev => [restored, ...prev.filter(p => p.id !== id)]);
                setTrashPeople(prev => prev.filter(p => p.id !== id));
                addAudit('person_restore', `Khôi phục ${restored.name}`);
                showToast('Đã khôi phục người dân!', 'success');
            };

            const restoreWave = (id) => {
                if (!requireAdmin()) return;
                const wave = trashWaves.find(w => w.id === id);
                if (!wave) return;
                const { deletedAt, ...restored } = wave;
                setWaves(prev => [restored, ...prev.filter(w => w.id !== id)]);
                setTrashWaves(prev => prev.filter(w => w.id !== id));
                const deleted = getDeletedWaveIds();
                deleted.delete(id);
                saveDeletedWaveIds(deleted);
                addAudit('wave_restore', `Khôi phục ${restored.name}`);
                showToast('Đã khôi phục đợt phát!', 'success');
            };

            const checkinPerson = (target) => {
                if (!target) return showToast('Không tìm thấy người dân với mã này.', 'error');
                setPeople(prev => prev.map(p => p.id === target.id ? {...p, status:'received', checkedInAt: Date.now()} : p));
                setCheckinCode('');
                addAudit('checkin', `Check-in ${target.name}`);
                showToast(`Đã check-in: ${target.name}`, 'success');
            };
            const handleCheckin = () => {
                const code = String(checkinCode || '').trim();
                if (!code) return showToast('Nhập hoặc quét mã trước.', 'warning');
                checkinPerson(people.find(p => [p.id, p.personalId].map(String).includes(code)));
            };

            const handleLogout = async () => {
                if (!confirm('Đăng xuất khỏi ứng dụng?')) return;
                const { signOut } = fns();
                await signOut(fbAuth());
                setCurrentUser(null);
                setPeople([]); setWaves([]);
                setSyncStatus('local');
            };

            // ── SYNC STATUS INDICATOR ──
            const SyncBadge = () => {
                const cfg = {
                    local:  { dot: 'yellow', label: 'Offline', color: 'text-amber-600 bg-amber-50 border-amber-200' },
                    syncing:{ dot: 'yellow', label: 'Đang đồng bộ...', color: 'text-blue-600 bg-blue-50 border-blue-200' },
                    synced: { dot: 'green', label: 'Đã đồng bộ', color: 'text-green-700 bg-green-50 border-green-200' },
                    error:  { dot: 'red', label: 'Lỗi sync', color: 'text-red-600 bg-red-50 border-red-200' }
                }[syncStatus] || {};
                return (
                    <button onClick={() => syncFromFirebase()}
                        className={`flex items-center gap-1.5 px-2 py-1 rounded-lg border text-xs font-medium cursor-pointer ${cfg.color}`}>
                        <span className={`sync-dot ${cfg.dot}`}></span>
                        {cfg.label}
                    </button>
                );
            };

            const SidebarItem = ({ id, iconName, label }) => (
                <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3.5 text-sm font-medium transition-all rounded-xl mb-2 ${activeTab===id?'bg-blue-600 text-white shadow-lg shadow-blue-200':'text-slate-600 hover:bg-slate-100'}`}>
                    <Icon name={iconName} size={20}/>{label}
                </button>
            );
            const viewTitle = {
                dashboard: 'Tổng Quan',
                import: 'Nhập Dữ Liệu',
                'create-wave': 'Phát Quà',
                checkin: 'Check-in',
                reports: 'Báo Cáo',
                history: 'Lịch Sử',
                admin: 'Quản Trị'
            }[activeTab] || 'Quà An Sinh';

            // ── AUTH LOADING ──
            if (authLoading) return (
                <div className="flex h-screen items-center justify-center flex-col gap-3 auth-bg">
                    <div className="bg-white/20 backdrop-blur p-5 rounded-3xl shadow-xl">
                        <span style={{fontSize:'3rem'}}>🎁</span>
                    </div>
                    <div className="text-white font-bold flex items-center gap-2">
                        <Icon name="loader-2" size={18} className="animate-spin"/> Đang khởi động...
                    </div>
                </div>
            );

            // Người dùng vào thẳng ứng dụng (dùng dữ liệu cục bộ).
            // Đăng nhập là tùy chọn — bật qua showAuthModal để đồng bộ đám mây.

            // ── APP LOADING ──
            if (loading) return (
                <div className="flex h-screen items-center justify-center flex-col gap-3">
                    <div className="bg-blue-600 text-white p-4 rounded-2xl shadow-lg"><Icon name="gift" size={32}/></div>
                    <div className="text-blue-600 font-bold flex items-center gap-2"><Icon name="loader-2" size={18} className="animate-spin"/> Đang tải dữ liệu...</div>
                </div>
            );

            return (
                <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
                    <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleRestore}/>

                    {/* TOAST */}
                    {toasts.length > 0 && <Toast toasts={toasts}/>}

                    {/* PWA INSTALL BANNER */}
                    {showPwaBanner && (
                        <div id="pwa-banner" className="show fixed top-0 left-0 right-0 z-[200] bg-blue-600 text-white px-4 py-3 flex items-center gap-3 shadow-lg">
                            <Icon name="smartphone" size={20}/>
                            <span className="flex-1 text-sm font-medium">Cài đặt Quà An Sinh như ứng dụng!</span>
                            <button onClick={handleInstallPWA} className="bg-white text-blue-600 font-bold px-3 py-1 rounded-lg text-xs">Cài đặt</button>
                            <button onClick={()=>setShowPwaBanner(false)} className="p-1 hover:bg-blue-700 rounded"><Icon name="x" size={16}/></button>
                        </div>
                    )}

                    {/* MOBILE OVERLAY */}
                    {isSidebarOpen && <div className="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm md:hidden" onClick={()=>setIsSidebarOpen(false)}></div>}

                    {/* SIDEBAR */}
                    <div className={`fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 flex flex-col p-4 shadow-xl transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${isSidebarOpen?'translate-x-0':'-translate-x-full'} ${showPwaBanner ? 'top-12 md:top-0' : ''}`}>
                        <div className="flex items-center justify-between mb-6 px-2 mt-2">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 text-white p-2 rounded-lg"><Icon name="gift" size={24}/></div>
                                <div><h1 className="text-xl font-bold text-slate-900 leading-none">Quà An Sinh</h1><span className="text-xs text-orange-500 font-bold">V4.0 Firebase</span></div>
                            </div>
                            <button onClick={()=>setIsSidebarOpen(false)} className="md:hidden text-slate-400"><Icon name="x" size={24}/></button>
                        </div>

                        {/* User info */}
                        {currentUser ? (
                            <div className="mb-4 px-2 py-2 bg-blue-50 rounded-xl flex items-center gap-2">
                                <div className="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center text-xs font-bold shrink-0">
                                    {currentUser.email?.[0]?.toUpperCase() || '?'}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-bold text-slate-700 truncate">{currentUser.email}</p>
                                    <p className="text-[10px] text-slate-400">Đã xác thực · Cloud sync bật</p>
                                </div>
                            </div>
                        ) : (
                            <button onClick={() => setShowAuthModal(true)} className="mb-4 w-full px-3 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl flex items-center gap-2 text-sm font-bold transition-colors">
                                <Icon name="log-in" size={16}/> Đăng nhập để đồng bộ
                            </button>
                        )}

                        {/* Sync Status */}
                        <div className="mb-4 px-2">
                            <SyncBadge/>
                        </div>

                        <nav className="flex-1 overflow-y-auto">
                            <SidebarItem id="dashboard" iconName="layout-grid" label="Tổng quan"/>
                            <SidebarItem id="import" iconName="file-input" label="Nhập dữ liệu"/>
                            <SidebarItem id="create-wave" iconName="wand-2" label="Tạo đợt phát"/>
                            <SidebarItem id="history" iconName="history" label="Lịch sử"/>

                            <SidebarItem id="checkin" iconName="scan-line" label="Check-in"/>
                            <SidebarItem id="reports" iconName="file-bar-chart" label="Báo cáo"/>
                            <SidebarItem id="admin" iconName="shield-check" label="Quản trị"/>

                            <div className="my-4 border-t border-slate-100"></div>

                            <div className="space-y-1">
                                    {currentUser && (
                                        <button onClick={() => syncFromFirebase()} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-colors">
                                            <Icon name="refresh-cw" size={18}/> Đồng bộ Firebase
                                        </button>
                                    )}
                                <button onClick={handleScanDuplicates} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-orange-50 hover:text-orange-600 rounded-xl transition-colors">
                                    <Icon name="search" size={18}/> Kiểm tra trùng
                                </button>
                                <button onClick={handleBackup} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-colors">
                                    <Icon name="download-cloud" size={18}/> Sao lưu JSON
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-green-50 hover:text-green-600 rounded-xl transition-colors">
                                    <Icon name="upload-cloud" size={18}/> Phục hồi JSON
                                </button>
                                <button onClick={() => setShowTrashModal(true)} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-red-50 hover:text-red-600 rounded-xl transition-colors">
                                    <Icon name="archive-restore" size={18}/> Thùng rác ({trashPeople.length + trashWaves.length})
                                </button>
                                <button onClick={() => setShowAuditModal(true)} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">
                                    <Icon name="clipboard-list" size={18}/> Nhật ký
                                </button>
                                {currentUser ? (
                                    <button onClick={handleLogout} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                                        <Icon name="log-out" size={18}/> Đăng xuất
                                    </button>
                                ) : (
                                    <button onClick={() => setShowAuthModal(true)} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-blue-600 hover:bg-blue-50 rounded-xl transition-colors">
                                        <Icon name="log-in" size={18}/> Đăng nhập / Đăng ký
                                    </button>
                                )}
                            </div>
                        </nav>
