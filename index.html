      ]

    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- FIREBASE CONFIG                                         -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc, query, orderBy }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASIILX-To5Y4v0NbDlVwRqfXfy2sxFDUE",
            authDomain: "qua-an-sinh.firebaseapp.com",
            projectId: "qua-an-sinh",
            storageBucket: "qua-an-sinh.firebasestorage.app",
            messagingSenderId: "126012039754",
            appId: "1:126012039754:web:06fbb037254f51237a3cb3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Expose to global scope for React (Babel/UMD)
        window._firebaseAuth = auth;
        window._firebaseDb = db;
        window._firebaseFns = {
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged,
            collection, getDocs, setDoc, doc, deleteDoc, query, orderBy
        };
        window._firebaseReady = true;
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2563eb', secondary: '#475569' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-in { animation: slideIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        @media (min-width: 768px) {
            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; min-width: 280px; max-width: 90vw; animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { opacity:0; transform: translate(-50%, 20px); } to { opacity:1; transform: translate(-50%, 0); } }
        /* PWA Install Banner */
        #pwa-banner { display: none; }
        #pwa-banner.show { display: flex; }
        .sync-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .sync-dot.green { background:#22c55e; }
        .sync-dot.yellow { background:#f59e0b; animation: pulse 1s infinite; }
        .sync-dot.red { background:#ef4444; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Auth styles */
        .auth-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #3b82f6 100%);
