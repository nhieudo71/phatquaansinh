        }
        .auth-card {
            backdrop-filter: blur(16px);
            background: rgba(255,255,255,0.97);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
        }
        .auth-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
        .auth-btn-primary {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            transition: all 0.2s;
        }
        .auth-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,0.4); }
        .auth-btn-primary:active { transform: translateY(0); }
        .auth-tab { transition: all 0.2s; }
        .auth-tab.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .firebase-badge {
            background: linear-gradient(135deg, #ff6d00, #ffca28);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- PWA Service Worker Registration -->
    <script>
    if ('serviceWorker' in navigator) {
        const swCode = `
const CACHE_NAME = 'qua-an-sinh-v4';
const urlsToCache = [location.pathname];
self.addEventListener('install', e => {
    e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(urlsToCache)));
    self.skipWaiting();
});
self.addEventListener('activate', e => {
    e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))));
    self.clients.claim();
});
self.addEventListener('fetch', e => {
    if (e.request.method !== 'GET') return;
    e.respondWith(
        fetch(e.request).then(r => {
            const clone = r.clone();
            caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
            return r;
        }).catch(() => caches.match(e.request))
    );
});
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
    }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // ═══════════════════════════════════════════════════════
        // FIREBASE HELPERS
        // ═══════════════════════════════════════════════════════
        const waitForFirebase = () => new Promise(resolve => {
            if (window._firebaseReady) return resolve();
            window.addEventListener('firebaseReady', resolve, { once: true });
        });

        const fbAuth = () => window._firebaseAuth;
        const fbDb = () => window._firebaseDb;
        const fns = () => window._firebaseFns;

        // Firestore helpers
        const fsGetAll = async (col) => {
            const { collection, getDocs, query, orderBy } = fns();
            const q = query(collection(fbDb(), col), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            return snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
        };

        const fsUpsert = async (col, id, data) => {
            const { doc, setDoc } = fns();
            await setDoc(doc(fbDb(), col, id), data, { merge: true });
        };

        const fsDelete = async (col, id) => {
            const { doc, deleteDoc } = fns();
            await deleteDoc(doc(fbDb(), col, id));
        };

        // ═══════════════════════════════════════════════════════
        // ICON COMPONENT
        // ═══════════════════════════════════════════════════════
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = '';
                    const el = document.createElement('i');
                    el.setAttribute('data-lucide', name);
                    el.setAttribute('width', size);
                    el.setAttribute('height', size);
                    if (className) el.setAttribute('class', className);
                    containerRef.current.appendChild(el);
                    if (window.lucide.createIcons) window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center shrink-0" style={{ width: size, height: size }}></span>;
        };

        // ═══════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════
        const generateID = () => `083${Math.floor(Math.random() * 1000000000).toString().padStart(9, '0')}`;
        const shuffleArray = (arr) => { for (let i = arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; };
        const getDuplicateGroups = (list) => {
            const groups = {};
            list.forEach(p => { const k = p.name.trim().toLowerCase(); if(!groups[k]) groups[k]=[]; groups[k].push(p); });
            return Object.values(groups).filter(g => g.length > 1);
        };

        // ═══════════════════════════════════════════════════════
        // TOAST COMPONENT
        // ═══════════════════════════════════════════════════════
        const Toast = ({ toasts }) => (
            <div className="toast">
                {toasts.map(t => (
                    <div key={t.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-white font-medium text-sm mb-2
                        ${t.type === 'success' ? 'bg-green-600' : t.type === 'error' ? 'bg-red-600' : t.type === 'warning' ? 'bg-amber-500' : 'bg-slate-800'}`}>
                        <Icon name={t.type==='success'?'check-circle':t.type==='error'?'x-circle':t.type==='warning'?'alert-triangle':'info'} size={18}/>
                        {t.msg}
                    </div>
                ))}
            </div>
        );

        // ═══════════════════════════════════════════════════════
        // CHART COMPONENTS
        // ═══════════════════════════════════════════════════════
        const SimplePieChart = ({ data, colors }) => {
            let cumPct = 0;
            const total = data.reduce((s, i) => s + i.value, 0);
            if (total === 0) return <div className="text-gray-400 text-xs text-center p-4">Chưa có dữ liệu</div>;
            return (
                <div className="relative w-32 h-32 md:w-40 md:h-40 mx-auto">
                    <svg viewBox="-1 -1 2 2" className="transform -rotate-90 w-full h-full">
                        {data.map((item, i) => {
                            const sp = cumPct, sl = item.value/total;
                            cumPct += sl;
                            const sx = Math.cos(2*Math.PI*sp), sy = Math.sin(2*Math.PI*sp);
                            const ex = Math.cos(2*Math.PI*cumPct), ey = Math.sin(2*Math.PI*cumPct);
                            const laf = sl > 0.5 ? 1 : 0;
                            const d = sl === 1 ? `M 0 0 L 1 0 A 1 1 0 1 1 1 -0.0001 L 0 0` : `M 0 0 L ${sx} ${sy} A 1 1 0 ${laf} 1 ${ex} ${ey} L 0 0`;
                            return <path key={i} d={d} fill={colors[i]} stroke="white" strokeWidth="0.02"/>;
                        })}
                    </svg>
                </div>
            );
        };

        const SimpleBarChart = ({ data }) => {
            if (data.length === 0) return <div className="text-gray-400 text-xs text-center p-4">Chưa có dữ liệu</div>;
            const maxVal = Math.max(...data.map(d => d.value));
            return (
                <div className="flex items-end gap-2 h-40 pt-6 pb-2 px-2 border-b border-l border-gray-200 w-full overflow-x-auto">
                    {data.map((item, i) => (
                        <div key={i} className="flex-1 flex flex-col items-center group relative min-w-[40px]">
                            <div className="w-full bg-blue-500 rounded-t-sm hover:bg-blue-600 transition-all relative" style={{ height: `${(item.value/maxVal)*100}%` }}>
                                <span className="absolute -top-5 left-1/2 transform -translate-x-1/2 text-[10px] font-bold text-gray-600">{item.value}</span>
                            </div>
                            <span className="text-[10px] text-gray-500 mt-1 w-full text-center truncate px-1">{item.label}</span>
                        </div>
                    ))}
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════
        // AUTH SCREEN
        // ═══════════════════════════════════════════════════════
        const AuthScreen = ({ onAuthSuccess }) => {
            const [tab, setTab] = useState('login'); // 'login' | 'register'
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [showPass, setShowPass] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');

            const mapError = (code) => {
                const m = {
                    'auth/invalid-email': 'Email không hợp lệ.',
                    'auth/user-not-found': 'Tài khoản không tồn tại.',
                    'auth/wrong-password': 'Mật khẩu không đúng.',
                    'auth/invalid-credential': 'Email hoặc mật khẩu không đúng.',
                    'auth/email-already-in-use': 'Email này đã được đăng ký.',
                    'auth/weak-password': 'Mật khẩu quá yếu (tối thiểu 6 ký tự).',
                    'auth/too-many-requests': 'Quá nhiều lần thử. Vui lòng thử lại sau.',
                    'auth/network-request-failed': 'Lỗi kết nối mạng.',
                };
                return m[code] || 'Có lỗi xảy ra, vui lòng thử lại.';
            };

            const handleLogin = async () => {
                if (!email || !password) return setError('Vui lòng nhập đầy đủ thông tin!');
                setLoading(true); setError(''); setSuccess('');
                try {
                    const { signInWithEmailAndPassword } = fns();
                    const cred = await signInWithEmailAndPassword(fbAuth(), email.trim(), password);
                    onAuthSuccess(cred.user);
                } catch(e) {
                    setError(mapError(e.code));
                } finally { setLoading(false); }
            };

            const handleRegister = async () => {
                if (!email || !password || !confirmPassword) return setError('Vui lòng nhập đầy đủ thông tin!');
                if (password !== confirmPassword) return setError('Mật khẩu xác nhận không khớp!');
                if (password.length < 6) return setError('Mật khẩu tối thiểu 6 ký tự!');
                setLoading(true); setError(''); setSuccess('');
                try {
                    const { createUserWithEmailAndPassword } = fns();
                    const cred = await createUserWithEmailAndPassword(fbAuth(), email.trim(), password);
                    setSuccess('Đăng ký thành công! Đang đăng nhập...');
                    setTimeout(() => onAuthSuccess(cred.user), 1000);
                } catch(e) {
                    setError(mapError(e.code));
                } finally { setLoading(false); }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') tab === 'login' ? handleLogin() : handleRegister();
            };

            return (
                <div className="auth-bg flex items-center justify-center p-4 min-h-screen">
                    <div className="auth-card rounded-3xl w-full max-w-md p-8 animate-fade-in">
                        {/* Logo */}
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-3xl shadow-xl shadow-blue-200 mb-4">
                                <span style={{fontSize:'2.5rem'}}>🎁</span>
                            </div>
                            <h1 className="text-2xl font-extrabold text-slate-900">Quà An Sinh</h1>
                            <p className="text-slate-400 text-sm mt-1">Hệ thống quản lý phát quà xã hội</p>
                            <div className="flex items-center justify-center gap-1 mt-2">
                                <span className="text-xs text-slate-400">Powered by</span>
                                <span className="firebase-badge text-xs font-bold">Firebase</span>
                            </div>
                        </div>

                        {/* Tab Switch */}
                        <div className="flex border-b border-slate-200 mb-6">
                            <button
                                onClick={() => { setTab('login'); setError(''); setSuccess(''); }}
                                className={`auth-tab flex-1 py-3 text-sm font-semibold ${tab==='login'?'active text-blue-600':'text-slate-400 hover:text-slate-600'}`}>
                                🔐 Đăng nhập
                            </button>
                            <button
                                onClick={() => { setTab('register'); setError(''); setSuccess(''); }}
                                className={`auth-tab flex-1 py-3 text-sm font-semibold ${tab==='register'?'active text-blue-600':'text-slate-400 hover:text-slate-600'}`}>
                                📝 Đăng ký
                            </button>
                        </div>

                        {/* Error / Success */}
                        {error && (
                            <div className="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-4 text-sm animate-fade-in">
                                <span>⚠️</span><span>{error}</span>
                            </div>
                        )}
                        {success && (
                            <div className="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-4 text-sm animate-fade-in">
                                <span>✅</span><span>{success}</span>
                            </div>
                        )}

                        {/* Fields */}
                        <div className="space-y-4">
                            {/* Email */}
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Email</label>
                                <div className="relative">
                                    <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                        <Icon name="mail" size={16}/>
                                    </span>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={e=>setEmail(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        placeholder="your@email.com"
                                        className="auth-input w-full border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm bg-slate-50 text-slate-800 transition-all"
                                    />
                                </div>
                            </div>

                            {/* Password */}
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Mật khẩu</label>
                                <div className="relative">
                                    <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                        <Icon name="lock" size={16}/>
                                    </span>
                                    <input
                                        type={showPass ? 'text' : 'password'}
                                        value={password}
                                        onChange={e=>setPassword(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        placeholder="Tối thiểu 6 ký tự"
                                        className="auth-input w-full border border-slate-200 rounded-xl py-3 pl-10 pr-12 text-sm bg-slate-50 text-slate-800 transition-all"
                                    />
                                    <button onClick={()=>setShowPass(!showPass)}
                                        className="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <Icon name={showPass?'eye-off':'eye'} size={16}/>
                                    </button>
                                </div>
                            </div>

                            {/* Confirm Password (register only) */}
                            {tab === 'register' && (
                                <div className="animate-fade-in">
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">Xác nhận mật khẩu</label>
                                    <div className="relative">
                                        <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                            <Icon name="shield-check" size={16}/>
                                        </span>
                                        <input
                                            type={showPass ? 'text' : 'password'}
                                            value={confirmPassword}
                                            onChange={e=>setConfirmPassword(e.target.value)}
                                            onKeyDown={handleKeyDown}
                                            placeholder="Nhập lại mật khẩu"
                                            className="auth-input w-full border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm bg-slate-50 text-slate-800 transition-all"
                                        />
                                    </div>
                                </div>
                            )}

                            {/* Submit */}
                            <button
                                onClick={tab==='login' ? handleLogin : handleRegister}
                                disabled={loading}
                                className="auth-btn-primary w-full text-white font-bold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2 mt-2 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none">
                                {loading
                                    ? <><Icon name="loader-2" size={18} className="animate-spin"/> Đang xử lý...</>
                                    : tab==='login'
                                        ? <><Icon name="log-in" size={18}/> Đăng nhập</>
                                        : <><Icon name="user-plus" size={18}/> Tạo tài khoản</>
                                }
                            </button>
                        </div>

                        {/* Switch hint */}
                        <p className="text-center text-xs text-slate-400 mt-6">
                            {tab==='login'
                                ? <>Chưa có tài khoản? <button onClick={()=>{setTab('register');setError('');setSuccess('');}} className="text-blue-600 font-semibold hover:underline">Đăng ký ngay</button></>
                                : <>Đã có tài khoản? <button onClick={()=>{setTab('login');setError('');setSuccess('');}} className="text-blue-600 font-semibold hover:underline">Đăng nhập</button></>
                            }
                        </p>

                        {/* Footer */}
                        <div className="mt-8 pt-5 border-t border-slate-100 text-center">
                            <p className="text-[11px] text-slate-300">🔒 Bảo mật bởi Google Firebase Authentication</p>
                            <p className="text-[11px] text-slate-300 mt-1">Quà An Sinh v4.0 · Phần mềm nội bộ</p>
                        </div>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════
        // MAIN APP
        // ═══════════════════════════════════════════════════════
        const App = () => {
            // --- AUTH STATE ---
            const [currentUser, setCurrentUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);

            // --- APP STATE ---
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [people, setPeople] = useState([]);
            const [waves, setWaves] = useState([]);
            const [loading, setLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState('local');
            const [toasts, setToasts] = useState([]);
            const [pwaInstallEvent, setPwaInstallEvent] = useState(null);
            const [showPwaBanner, setShowPwaBanner] = useState(false);

            // Modal States
            const [viewingWave, setViewingWave] = useState(null);
            const [showDupModal, setShowDupModal] = useState(false);
            const [duplicateGroups, setDuplicateGroups] = useState([]);
            const [editingPerson, setEditingPerson] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [showAddModal, setShowAddModal] = useState(false);
            const [addForm, setAddForm] = useState({ name: '', personalId: '', address: '', category: 'Hộ Thường' });
            const [distForm, setDistForm] = useState({
                name: '', date: new Date().toISOString().split('T')[0],
                quantity: 10, filterAddress: 'all', filterCategory: 'all'
            });

            const fileInputRef = useRef(null);

            // ── TOAST HELPER ──
            const showToast = useCallback((msg, type='info', duration=3000) => {
                const id = Date.now();
                setToasts(t => [...t, { id, msg, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), duration);
            }, []);

            // ── PWA INSTALL PROMPT ──
            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setPwaInstallEvent(e); setShowPwaBanner(true); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstallPWA = async () => {
                if (!pwaInstallEvent) return;
                pwaInstallEvent.prompt();
                const { outcome } = await pwaInstallEvent.userChoice;
                if (outcome === 'accepted') { setShowPwaBanner(false); showToast('Đã cài đặt ứng dụng!', 'success'); }
            };

            // ── FIREBASE AUTH LISTENER ──
            useEffect(() => {
                waitForFirebase().then(() => {
                    const { onAuthStateChanged } = fns();
                    const unsub = onAuthStateChanged(fbAuth(), (user) => {
                        setCurrentUser(user);
                        setAuthLoading(false);
                    });
                    return unsub;
                });
            }, []);

            // ── FIREBASE SYNC FUNCTIONS ──
            const syncFromFirebase = useCallback(async () => {
                if (!currentUser) return;
                setSyncStatus('syncing');
                try {
                    const [pData, wData] = await Promise.all([
                        fsGetAll(`users/${currentUser.uid}/people`),
                        fsGetAll(`users/${currentUser.uid}/waves`)
                    ]);
                    const mappedPeople = pData.map(p => ({
                        id: p.id, personalId: p.personalId, name: p.name,
                        address: p.address, category: p.category,
                        status: p.status, waveId: p.waveId, createdAt: p.createdAt
                    }));
                    const mappedWaves = wData.map(w => ({
                        id: w.id, name: w.name, date: w.date,
                        count: w.count, criteria: w.criteria,
                        recipients: typeof w.recipients === 'string' ? JSON.parse(w.recipients) : (w.recipients || []),
                        createdAt: w.createdAt
                    }));
                    setPeople(mappedPeople);
                    setWaves(mappedWaves);
                    localStorage.setItem('charity_people', JSON.stringify(mappedPeople));
                    localStorage.setItem('charity_waves', JSON.stringify(mappedWaves));
                    setSyncStatus('synced');
                    showToast(`Đã tải ${mappedPeople.length} người từ đám mây`, 'success');
                } catch(e) {
                    setSyncStatus('error');
                    showToast('Lỗi tải dữ liệu: ' + e.message, 'error');
                }
            }, [currentUser, showToast]);

            const syncToFirebase = useCallback(async (newPeople, newWaves) => {
                if (!currentUser) return;
                setSyncStatus('syncing');
                try {
                    const ps = newPeople || people;
                    const ws = newWaves || waves;
                    await Promise.all([
                        ...ps.map(p => fsUpsert(`users/${currentUser.uid}/people`, p.id, {
                            id: p.id, personalId: p.personalId, name: p.name,
                            address: p.address, category: p.category,
                            status: p.status, waveId: p.waveId || null, createdAt: p.createdAt
                        })),
                        ...ws.map(w => fsUpsert(`users/${currentUser.uid}/waves`, w.id, {
                            id: w.id, name: w.name, date: w.date,
                            count: w.count, criteria: w.criteria,
                            recipients: w.recipients, createdAt: w.createdAt
                        }))
                    ]);
                    setSyncStatus('synced');
                } catch(e) {
                    setSyncStatus('error');
                    showToast('Lỗi đồng bộ: ' + e.message, 'error');
                }
            }, [currentUser, people, waves, showToast]);

            // ── INIT DATA ──
            useEffect(() => {
                if (!currentUser) return;
                const init = async () => {
                    setLoading(true);
                    const savedPeople = localStorage.getItem('charity_people');
                    const savedWaves = localStorage.getItem('charity_waves');
                    if (savedPeople) setPeople(JSON.parse(savedPeople));
                    if (savedWaves) setWaves(JSON.parse(savedWaves));
                    await syncFromFirebase();
                    setLoading(false);
                };
                init();
            }, [currentUser]);

            // ── AUTO SAVE ──
            const saveTimeout = useRef(null);
            useEffect(() => {
                if (loading || !currentUser) return;
                localStorage.setItem('charity_people', JSON.stringify(people));
                localStorage.setItem('charity_waves', JSON.stringify(waves));
                clearTimeout(saveTimeout.current);
                saveTimeout.current = setTimeout(() => syncToFirebase(people, waves), 1500);
            }, [people, waves, loading]);

            useEffect(() => { setIsSidebarOpen(false); }, [activeTab]);

            // ── STATS ──
            const stats = useMemo(() => ({
                total: people.length,
                waiting: people.filter(p => p.status === 'waiting').length,
                received: people.filter(p => p.status === 'received').length,
                waves: waves.length
            }), [people, waves]);

            const sortedPeople = useMemo(() => [...people].sort((a,b) => (b.createdAt||0)-(a.createdAt||0)), [people]);
            const addressStats = useMemo(() => {
                const c = {};
                people.forEach(p => { c[p.address] = (c[p.address]||0)+1; });
                return Object.entries(c).map(([l,v]) => ({ label:l, value:v })).sort((a,b)=>b.value-a.value).slice(0,10);
            }, [people]);
            const uniqueAddresses = useMemo(() => [...new Set(people.map(p=>p.address))], [people]);
            const uniqueCategories = useMemo(() => [...new Set(people.map(p=>p.category))], [people]);

            // ── HANDLERS ──
            const handleBackup = () => {
                const data = { version: "4.0", exportDate: new Date().toISOString(), people, waves };
                const blob = new Blob([JSON.stringify(data,null,2)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `SaoLuu_QuaAnSinh_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                showToast('Đã xuất file sao lưu', 'success');
            };

            const handleRestore = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if(data.people && Array.isArray(data.people)) {
                            if(confirm(`Phục hồi ${data.people.length} người? Dữ liệu cũ sẽ mất.`)) {
                                setPeople(data.people); setWaves(data.waves||[]);
                                showToast('Phục hồi thành công!', 'success');
                                setActiveTab('dashboard');
                            }
                        } else showToast('File không hợp lệ!', 'error');
                    } catch(err) { showToast('Lỗi đọc file!', 'error'); }
                    finally { e.target.value = null; }
                };
                reader.readAsText(file);
            };

            const handleExportExcel = () => {
                if (people.length === 0) return showToast('Chưa có dữ liệu!', 'warning');
                const data = sortedPeople.map((p,i) => ({
                    STT: i+1, 'Họ Tên': p.name, 'CCCD/ID': p.personalId,
                    'Địa Chỉ': p.address, 'Đối Tượng': p.category,
                    'Trạng Thái': p.status==='received'?'Đã nhận':'Chưa nhận',
                    'Đợt Gần Nhất': p.waveId ? (waves.find(w=>w.id===p.waveId)?.name||'') : ''
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "DanhSach");
                XLSX.writeFile(wb, `DanhSach_AnSinh_${new Date().toISOString().slice(0,10)}.xlsx`);
                showToast('Xuất Excel thành công!', 'success');
            };

            const handleExportWaveExcel = (wave) => {
                const data = wave.recipients.map((p,i) => ({
                    STT: i+1, 'Họ Tên': p.name, 'CCCD/ID': p.personalId,
                    'Địa Chỉ': p.address, 'Đối Tượng': p.category, 'Ngày Nhận': wave.date
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "DanhSach");
                XLSX.writeFile(wb, `DS_Dot_${wave.name}.xlsx`);
                showToast('Đã xuất Excel đợt phát!', 'success');
            };

            const handleAddPerson = () => {
                if (!addForm.name) return showToast('Vui lòng nhập họ tên!', 'warning');
                const pid = addForm.personalId || generateID();
                const newPerson = { id: pid, personalId: pid, name: addForm.name, address: addForm.address||'Chưa rõ', category: addForm.category||'Hộ Thường', status: 'waiting', waveId: null, createdAt: Date.now() };
                if (people.some(p => p.personalId === pid)) {
                    if (!confirm("Mã ID này đã tồn tại. Bạn có chắc chắn muốn thêm?")) return;
                }
                setPeople(prev => [newPerson, ...prev]);
                setAddForm({ name: '', personalId: '', address: '', category: 'Hộ Thường' });
                setShowAddModal(false);
                showToast('Đã thêm người mới!', 'success');
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        const map = new Map(people.map(p => [String(p.personalId), p]));
                        let countNew = 0;
                        data.forEach((item, idx) => {
                            const pid = String(item['CCCD']||item['CMND']||item['ID']||item['MaSo']||generateID());
                            const name = item['HoTen']||item['Họ Tên']||item['Name']||`Người ${idx}`;
                            const np = { id: pid, personalId: pid, name, address: item['DiaChi']||item['Địa Chỉ']||item['Address']||'Chưa rõ', category: item['DoiTuong']||item['Đối Tượng']||item['Category']||'Hộ Thường', status: 'waiting', waveId: null, createdAt: Date.now() };
                            if (map.has(pid)) { const old = map.get(pid); map.set(pid, {...np, status:old.status, waveId:old.waveId, createdAt:old.createdAt||Date.now()}); }
                            else { map.set(pid, np); countNew++; }
                        });
                        const updated = Array.from(map.values());
                        setPeople(updated);
                        const dups = getDuplicateGroups(updated);
                        if (dups.length > 0) { setDuplicateGroups(dups); setShowDupModal(true); }
                        else showToast(`Đã nhập ${updated.length} người! (+${countNew} mới)`, 'success');
                    } catch(err) { showToast('Lỗi file: ' + err.message, 'error'); }
                };
                reader.readAsBinaryString(file);
            };

            const handleScanDuplicates = () => {
                const dups = getDuplicateGroups(people);
                if (dups.length === 0) showToast('Không có trùng tên.', 'success');
                else { setDuplicateGroups(dups); setShowDupModal(true); }
            };

            const handleDeletePerson = (id) => {
                if(window.confirm("Xóa người này?")) {
                    setPeople(prev => prev.filter(p => p.id !== id));
                    setDuplicateGroups(prev => prev.map(g=>g.filter(p=>p.id!==id)).filter(g=>g.length>1));
                }
            };

            const openEditModal = (person) => { setEditingPerson(person); setEditForm({...person}); };
            const handleSaveEdit = () => {
                if (!editForm.name) return showToast('Thiếu tên!', 'warning');
                setPeople(prev => prev.map(p => p.id === editingPerson.id ? {...p,...editForm} : p));
                setEditingPerson(null);
                showToast('Đã cập nhật thông tin!', 'success');
            };

            const loadMockData = () => {
                const mock = Array.from({length:50}, (_,i) => ({
                    id: generateID(), personalId: generateID(),
                    name: `Người Mẫu ${i+1}`, address: `Thôn ${i%5+1}`,
                    category: ['Nghèo','Cận Nghèo'][i%2], status: 'waiting', waveId: null, createdAt: Date.now()
                }));
                setPeople(prev => [...prev, ...mock]);
                showToast('Đã thêm 50 người mẫu!', 'info');
            };

            const handleCreateWave = () => {
                if (!distForm.name) return showToast('Nhập tên đợt!', 'warning');
                let candidates = people.filter(p => p.status === 'waiting');
                if (distForm.filterAddress !== 'all') candidates = candidates.filter(p => p.address === distForm.filterAddress);
                if (distForm.filterCategory !== 'all') candidates = candidates.filter(p => p.category === distForm.filterCategory);
                if (candidates.length === 0) return showToast('Không còn ai thỏa điều kiện!', 'warning');
                if (distForm.filterAddress === 'all' && distForm.filterCategory === 'all') candidates = shuffleArray([...candidates]);
                const qty = Math.min(parseInt(distForm.quantity), candidates.length);
                const selected = candidates.slice(0, qty);
                const selIds = new Set(selected.map(p => p.id));
                const newWave = { id: `W${Date.now()}`, name: distForm.name, date: distForm.date, count: selected.length, criteria: `${distForm.filterAddress}/${distForm.filterCategory}`, recipients: selected, createdAt: Date.now() };
                setWaves(prev => [newWave, ...prev]);
                setPeople(prev => prev.map(p => selIds.has(p.id) ? {...p, status:'received', waveId:newWave.id} : p));
                showToast(`Đã tạo đợt ${qty} suất!`, 'success');
                setActiveTab('history');
                setViewingWave(newWave);
            };

            const handleResetCampaign = () => {
                if (confirm("Reset trạng thái 'Chưa nhận' cho tất cả?")) {
                    setPeople(prev => prev.map(p => ({...p, status:'waiting', waveId:null})));
                    setWaves([]);
                    showToast('Đã reset mùa vụ mới!', 'info');
                }
            };

            const handleHardReset = () => {
                if (confirm("XÓA SẠCH DỮ LIỆU?")) {
                    setPeople([]); setWaves([]);
                    localStorage.clear();
                    showToast('Đã xóa toàn bộ dữ liệu', 'warning');
                }
            };

            const handleLogout = async () => {
                if (!confirm('Đăng xuất khỏi ứng dụng?')) return;
                const { signOut } = fns();
                await signOut(fbAuth());
                setCurrentUser(null);
                setPeople([]); setWaves([]);
                setSyncStatus('local');
            };

            // ── SYNC STATUS INDICATOR ──
            const SyncBadge = () => {
                const cfg = {
                    local:  { dot: 'yellow', label: 'Offline', color: 'text-amber-600 bg-amber-50 border-amber-200' },
                    syncing:{ dot: 'yellow', label: 'Đang đồng bộ...', color: 'text-blue-600 bg-blue-50 border-blue-200' },
                    synced: { dot: 'green', label: 'Đã đồng bộ', color: 'text-green-700 bg-green-50 border-green-200' },
                    error:  { dot: 'red', label: 'Lỗi sync', color: 'text-red-600 bg-red-50 border-red-200' }
                }[syncStatus] || {};
                return (
                    <button onClick={() => syncFromFirebase()}
                        className={`flex items-center gap-1.5 px-2 py-1 rounded-lg border text-xs font-medium cursor-pointer ${cfg.color}`}>
                        <span className={`sync-dot ${cfg.dot}`}></span>
                        {cfg.label}
                    </button>
                );
            };

            const SidebarItem = ({ id, iconName, label }) => (
                <button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3.5 text-sm font-medium transition-all rounded-xl mb-2 ${activeTab===id?'bg-blue-600 text-white shadow-lg shadow-blue-200':'text-slate-600 hover:bg-slate-100'}`}>
                    <Icon name={iconName} size={20}/>{label}
                </button>
            );

            // ── AUTH LOADING ──
            if (authLoading) return (
                <div className="flex h-screen items-center justify-center flex-col gap-3 auth-bg">
                    <div className="bg-white/20 backdrop-blur p-5 rounded-3xl shadow-xl">
                        <span style={{fontSize:'3rem'}}>🎁</span>
                    </div>
                    <div className="text-white font-bold flex items-center gap-2">
                        <Icon name="loader-2" size={18} className="animate-spin"/> Đang khởi động...
                    </div>
                </div>
            );

            // ── NOT LOGGED IN ──
            if (!currentUser) return <AuthScreen onAuthSuccess={setCurrentUser}/>;

            // ── APP LOADING ──
            if (loading) return (
                <div className="flex h-screen items-center justify-center flex-col gap-3">
                    <div className="bg-blue-600 text-white p-4 rounded-2xl shadow-lg"><Icon name="gift" size={32}/></div>
                    <div className="text-blue-600 font-bold flex items-center gap-2"><Icon name="loader-2" size={18} className="animate-spin"/> Đang tải dữ liệu...</div>
                </div>
            );

            return (
                <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
                    <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleRestore}/>

                    {/* TOAST */}
                    {toasts.length > 0 && <Toast toasts={toasts}/>}

                    {/* PWA INSTALL BANNER */}
                    {showPwaBanner && (
                        <div id="pwa-banner" className="show fixed top-0 left-0 right-0 z-[200] bg-blue-600 text-white px-4 py-3 flex items-center gap-3 shadow-lg">
                            <Icon name="smartphone" size={20}/>
                            <span className="flex-1 text-sm font-medium">Cài đặt Quà An Sinh như ứng dụng!</span>
                            <button onClick={handleInstallPWA} className="bg-white text-blue-600 font-bold px-3 py-1 rounded-lg text-xs">Cài đặt</button>
                            <button onClick={()=>setShowPwaBanner(false)} className="p-1 hover:bg-blue-700 rounded"><Icon name="x" size={16}/></button>
                        </div>
                    )}

                    {/* MOBILE OVERLAY */}
                    {isSidebarOpen && <div className="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm md:hidden" onClick={()=>setIsSidebarOpen(false)}></div>}

                    {/* SIDEBAR */}
                    <div className={`fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 flex flex-col p-4 shadow-xl transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${isSidebarOpen?'translate-x-0':'-translate-x-full'} ${showPwaBanner ? 'top-12 md:top-0' : ''}`}>
                        <div className="flex items-center justify-between mb-6 px-2 mt-2">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 text-white p-2 rounded-lg"><Icon name="gift" size={24}/></div>
                                <div><h1 className="text-xl font-bold text-slate-900 leading-none">Quà An Sinh</h1><span className="text-xs text-orange-500 font-bold">V4.0 Firebase</span></div>
                            </div>
                            <button onClick={()=>setIsSidebarOpen(false)} className="md:hidden text-slate-400"><Icon name="x" size={24}/></button>
                        </div>

                        {/* User info */}
                        <div className="mb-4 px-2 py-2 bg-blue-50 rounded-xl flex items-center gap-2">
                            <div className="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center text-xs font-bold shrink-0">
                                {currentUser.email?.[0]?.toUpperCase() || '?'}
                            </div>
                            <div className="flex-1 min-w-0">
                                <p className="text-xs font-bold text-slate-700 truncate">{currentUser.email}</p>
                                <p className="text-[10px] text-slate-400">Đã xác thực</p>
                            </div>
                        </div>

                        {/* Sync Status */}
                        <div className="mb-4 px-2">
                            <SyncBadge/>
                        </div>

                        <nav className="flex-1 overflow-y-auto">
                            <SidebarItem id="dashboard" iconName="layout-grid" label="Tổng quan"/>
                            <SidebarItem id="import" iconName="file-input" label="Nhập dữ liệu"/>
                            <SidebarItem id="create-wave" iconName="wand-2" label="Tạo đợt phát"/>
                            <SidebarItem id="history" iconName="history" label="Lịch sử"/>

                            <div className="my-4 border-t border-slate-100"></div>

                            <div className="space-y-1">
                                <button onClick={() => syncFromFirebase()} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-colors">
                                    <Icon name="refresh-cw" size={18}/> Đồng bộ Firebase
                                </button>
                                <button onClick={handleScanDuplicates} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-orange-50 hover:text-orange-600 rounded-xl transition-colors">
                                    <Icon name="search" size={18}/> Kiểm tra trùng
                                </button>
                                <button onClick={handleBackup} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-colors">
                                    <Icon name="download-cloud" size={18}/> Sao lưu JSON
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-green-50 hover:text-green-600 rounded-xl transition-colors">
                                    <Icon name="upload-cloud" size={18}/> Phục hồi JSON
                                </button>
                                <button onClick={handleLogout} className="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                                    <Icon name="log-out" size={18}/> Đăng xuất
                                </button>
                            </div>
                        </nav>

                        <div className="mt-4 pt-4 border-t border-slate-100 flex gap-2">
                            <button onClick={handleResetCampaign} className="flex-1 bg-purple-50 text-purple-700 hover:bg-purple-100 py-2 rounded-lg text-xs font-bold flex flex-col items-center justify-center gap-1">
                                <Icon name="refresh-cw" size={16}/> Mùa Vụ Mới
                            </button>
                            <button onClick={handleHardReset} className="flex-1 bg-red-50 text-red-600 hover:bg-red-100 py-2 rounded-lg text-xs font-bold flex flex-col items-center justify-center gap-1">
                                <Icon name="trash-2" size={16}/> Xóa Hết
                            </button>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className={`flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative w-full ${showPwaBanner?'pt-12 md:pt-0':''}`}>
                        {/* MOBILE HEADER */}
                        <div className="md:hidden bg-white px-4 py-3 border-b flex justify-between items-center shadow-sm z-30 sticky top-0">
                            <div className="flex items-center gap-2">
                                <button onClick={()=>setIsSidebarOpen(true)} className="p-2 -ml-2 text-slate-600"><Icon name="menu" size={24}/></button>
                                <span className="font-bold text-lg text-slate-800">
                                    {activeTab==='dashboard'?'Tổng Quan':activeTab==='import'?'Nhập Dữ Liệu':activeTab==='create-wave'?'Phát Quà':'Lịch Sử'}
                                </span>
                            </div>
                            <div className="flex items-center gap-2">
                                <SyncBadge/>
                                <div className="bg-blue-100 text-blue-700 px-2 py-1 rounded-md text-xs font-bold">{people.length} Dân</div>
                            </div>
                        </div>

                        {/* DESKTOP HEADER */}
                        <div className="hidden md:flex bg-white px-8 py-4 border-b justify-between items-center shadow-sm z-30">
                            <span className="font-bold text-xl text-slate-800">
                                {activeTab==='dashboard'?'Tổng Quan':activeTab==='import'?'Nhập Dữ Liệu':activeTab==='create-wave'?'Phát Quà':'Lịch Sử'}
                            </span>
                            <div className="flex items-center gap-3">
                                <SyncBadge/>
                                <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 border rounded-lg text-sm text-slate-600">
                                    <Icon name="user" size={14}/>
                                    <span className="max-w-[150px] truncate">{currentUser.email}</span>
                                </div>
                                <button onClick={handleLogout} className="flex items-center gap-1 px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded-lg text-sm font-medium transition-colors">
                                    <Icon name="log-out" size={14}/> Xuất
                                </button>
                                <div className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-sm font-bold">{people.length} Dân</div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
                            {/* DASHBOARD */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {[
                                            { label:'Tổng Dân Số', value:stats.total, icon:'users', color:'bg-blue-600', light:'bg-blue-50', text:'text-blue-700' },
                                            { label:'Chưa Nhận Quà', value:stats.waiting, icon:'clock', color:'bg-amber-500', light:'bg-amber-50', text:'text-amber-700' },
                                            { label:'Đã Nhận Quà', value:stats.received, icon:'check-circle', color:'bg-green-600', light:'bg-green-50', text:'text-green-700' },
                                            { label:'Số Đợt Phát', value:stats.waves, icon:'gift', color:'bg-purple-600', light:'bg-purple-50', text:'text-purple-700' },
                                        ].map(s => (
                                            <div key={s.label} className={`${s.light} rounded-2xl p-5 border border-opacity-20`}>
                                                <div className={`${s.color} text-white p-2 rounded-lg inline-flex mb-3`}><Icon name={s.icon} size={20}/></div>
                                                <div className={`text-3xl font-extrabold ${s.text}`}>{s.value}</div>
                                                <div className="text-xs text-slate-500 mt-1 font-medium">{s.label}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white rounded-2xl p-5 shadow-sm border">
                                            <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="pie-chart" size={18} className="text-blue-500"/>Tỉ lệ phát quà</h3>
                                            <SimplePieChart
                                                data={[{label:'Chưa nhận',value:stats.waiting},{label:'Đã nhận',value:stats.received}]}
                                                colors={['#f59e0b','#22c55e']}
                                            />
                                            <div className="flex justify-center gap-6 mt-3">
                                                {[{c:'bg-amber-400',l:'Chưa nhận'},{c:'bg-green-500',l:'Đã nhận'}].map(i=>(
                                                    <div key={i.l} className="flex items-center gap-1.5 text-xs text-slate-600"><span className={`w-3 h-3 rounded-full ${i.c}`}></span>{i.l}</div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-2xl p-5 shadow-sm border">
                                            <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="bar-chart-2" size={18} className="text-purple-500"/>Theo địa bàn (Top 10)</h3>
                                            <SimpleBarChart data={addressStats}/>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* IMPORT TAB */}
                            {activeTab === 'import' && (
                                <div className="space-y-6 animate-fade-in max-w-2xl mx-auto">
                                    <div className="bg-white rounded-2xl shadow-sm border p-6">
                                        <h3 className="font-bold text-lg mb-5 flex gap-2 items-center text-slate-800"><Icon name="file-spreadsheet" size={22} className="text-green-600"/>Nhập từ Excel</h3>
                                        <div className="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer"
                                            onClick={() => document.getElementById('xlsxUpload').click()}>
                                            <Icon name="upload-cloud" size={36} className="text-slate-300 mx-auto mb-3"/>
                                            <p className="font-semibold text-slate-600">Nhấn để chọn file Excel</p>
                                            <p className="text-xs text-slate-400 mt-1">Hỗ trợ .xlsx, .xls · Cột: HoTen, CCCD, DiaChi, DoiTuong</p>
                                        </div>
                                        <input id="xlsxUpload" type="file" accept=".xlsx,.xls" className="hidden" onChange={handleFileUpload}/>
                                        <button onClick={loadMockData} className="mt-4 w-full py-2.5 border border-dashed border-slate-300 text-slate-500 rounded-xl text-sm hover:bg-slate-50 flex items-center justify-center gap-2">
                                            <Icon name="database" size={16}/> Thêm dữ liệu mẫu (50 người)
                                        </button>
                                    </div>

                                    <div className="bg-white rounded-2xl shadow-sm border">
                                        <div className="p-5 border-b flex justify-between items-center">
                                            <h3 className="font-bold text-slate-800 flex gap-2 items-center"><Icon name="list" size={18} className="text-blue-500"/>Danh sách ({sortedPeople.length})</h3>
                                            <div className="flex gap-2">
                                                <button onClick={() => setShowAddModal(true)} className="flex items-center gap-1.5 px-3 py-1.5 bg-purple-600 text-white rounded-lg text-xs font-bold hover:bg-purple-700">
                                                    <Icon name="user-plus" size={14}/> Thêm
                                                </button>
                                                <button onClick={handleExportExcel} className="flex items-center gap-1.5 px-3 py-1.5 bg-green-600 text-white rounded-lg text-xs font-bold hover:bg-green-700">
                                                    <Icon name="file-down" size={14}/> Excel
                                                </button>
                                            </div>
                                        </div>
                                        <div className="divide-y max-h-96 overflow-y-auto">
                                            {sortedPeople.length === 0 && <div className="text-center py-12 text-slate-400"><Icon name="inbox" size={32} className="mx-auto mb-2"/>Chưa có dữ liệu</div>}
                                            {sortedPeople.map(p => (
                                                <div key={p.id} className="flex items-center px-5 py-3 hover:bg-slate-50 gap-3">
                                                    <div className={`w-2 h-2 rounded-full shrink-0 ${p.status==='received'?'bg-green-400':'bg-amber-400'}`}></div>
                                                    <div className="flex-1 min-w-0">
                                                        <p className="font-semibold text-sm text-slate-800 truncate">{p.name}</p>
                                                        <p className="text-xs text-slate-400 truncate">{p.personalId} · {p.address} · {p.category}</p>
                                                    </div>
                                                    <div className="flex gap-1 shrink-0">
                                                        <button onClick={()=>openEditModal(p)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg"><Icon name="edit-2" size={14}/></button>
                                                        <button onClick={()=>handleDeletePerson(p.id)} className="p-1.5 text-red-500 hover:bg-red-50 rounded-lg"><Icon name="trash-2" size={14}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* CREATE WAVE TAB */}
                            {activeTab === 'create-wave' && (
                                <div className="max-w-lg mx-auto animate-fade-in">
                                    <div className="bg-white rounded-2xl shadow-sm border p-6">
                                        <h3 className="font-bold text-lg mb-6 flex gap-2 items-center text-slate-800"><Icon name="wand-2" size={22} className="text-purple-600"/>Tạo Đợt Phát Mới</h3>
                                        <div className="space-y-4">
                                            <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Tên đợt phát <span className="text-red-500">*</span></label>
                                                <input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500"
                                                    value={distForm.name} onChange={e=>setDistForm({...distForm,name:e.target.value})} placeholder="VD: Đợt 1 - Tết Nguyên Đán 2025"/>
                                            </div>
                                            <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Ngày phát</label>
                                                <input type="date" className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500"
                                                    value={distForm.date} onChange={e=>setDistForm({...distForm,date:e.target.value})}/>
                                            </div>
                                            <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Số suất cần phát</label>
                                                <input type="number" min="1" className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500"
                                                    value={distForm.quantity} onChange={e=>setDistForm({...distForm,quantity:e.target.value})}/>
                                                <p className="text-xs text-slate-400 mt-1">Hiện còn {stats.waiting} người chưa nhận</p>
                                            </div>
                                            <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Lọc theo địa bàn</label>
                                                <select className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500"
                                                    value={distForm.filterAddress} onChange={e=>setDistForm({...distForm,filterAddress:e.target.value})}>
                                                    <option value="all">Tất cả địa bàn</option>
                                                    {uniqueAddresses.map(a=><option key={a} value={a}>{a}</option>)}
                                                </select>
                                            </div>
                                            <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Lọc theo đối tượng</label>
                                                <select className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500"
                                                    value={distForm.filterCategory} onChange={e=>setDistForm({...distForm,filterCategory:e.target.value})}>
                                                    <option value="all">Tất cả đối tượng</option>
                                                    {uniqueCategories.map(c=><option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <button onClick={handleCreateWave} className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-200 flex justify-center items-center gap-2 mt-2">
                                                <Icon name="wand-2" size={20}/> Tạo Đợt Phát Ngay
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* HISTORY TAB */}
                            {activeTab === 'history' && (
                                <div className="space-y-4 animate-fade-in">
                                    {waves.length === 0 && (
                                        <div className="text-center py-16 text-slate-400">
                                            <Icon name="history" size={40} className="mx-auto mb-3 opacity-30"/>
                                            <p className="font-medium">Chưa có đợt phát nào</p>
                                        </div>
                                    )}
                                    {waves.map(w => (
                                        <div key={w.id} className="bg-white rounded-2xl shadow-sm border p-5 flex flex-col md:flex-row md:items-center gap-4">
                                            <div className="bg-purple-100 p-3 rounded-xl self-start shrink-0"><Icon name="gift" size={24} className="text-purple-600"/></div>
                                            <div className="flex-1">
                                                <h4 className="font-bold text-slate-800">{w.name}</h4>
                                                <div className="flex flex-wrap gap-3 mt-1 text-xs text-slate-500">
                                                    <span className="flex items-center gap-1"><Icon name="calendar" size={12}/>{w.date}</span>
                                                    <span className="flex items-center gap-1"><Icon name="users" size={12}/>{w.count} suất</span>
                                                    <span className="flex items-center gap-1"><Icon name="filter" size={12}/>{w.criteria}</span>
                                                </div>
                                            </div>
                                            <button onClick={()=>setViewingWave(w)} className="bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 self-start md:self-center">
                                                <Icon name="eye" size={16}/> Xem
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* VIEW WAVE MODAL */}
                    {viewingWave && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col md:max-h-[85vh] max-h-full">
                                <div className="p-5 border-b flex justify-between items-center md:rounded-t-2xl bg-purple-50">
                                    <div>
                                        <h3 className="font-bold text-slate-800">{viewingWave.name}</h3>
                                        <p className="text-xs text-slate-500">{viewingWave.count} người · {viewingWave.date}</p>
                                    </div>
                                    <button onClick={()=>setViewingWave(null)} className="p-2 hover:bg-purple-100 rounded-xl text-slate-500"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-0">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-white sticky top-0 shadow-sm z-10">
                                            <tr><th className="px-4 py-3 text-xs text-slate-500 uppercase bg-slate-50">STT</th><th className="px-4 py-3 text-xs text-slate-500 uppercase bg-slate-50">Họ Tên</th><th className="px-4 py-3 text-xs text-slate-500 uppercase bg-slate-50">Chi tiết</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {viewingWave.recipients.map((p,i) => (
                                                <tr key={p.id} className="text-sm">
                                                    <td className="px-4 py-3 text-slate-400 font-mono">{i+1}</td>
                                                    <td className="px-4 py-3 font-medium text-slate-800">{p.name}<br/><span className="text-xs font-normal text-slate-400 font-mono">{p.personalId}</span></td>
                                                    <td className="px-4 py-3 text-slate-500 text-xs">{p.address} • {p.category}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 border-t bg-white md:rounded-b-2xl">
                                    <button onClick={()=>handleExportWaveExcel(viewingWave)} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-200 flex justify-center items-center gap-2">
                                        <Icon name="file-down" size={20}/> Xuất Excel Đợt Này
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {editingPerson && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                                <h3 className="font-bold text-lg mb-6 flex gap-2 items-center text-slate-800 border-b pb-2"><Icon name="user-cog" size={24} className="text-blue-600"/> Sửa thông tin</h3>
                                <div className="space-y-4">
                                    <input className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-500" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} placeholder="Họ tên"/>
                                    <input className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-500" value={editForm.personalId} onChange={e=>setEditForm({...editForm,personalId:e.target.value})} placeholder="CCCD/ID"/>
                                    <input className="w-full border p-3 rounded-xl bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-blue-500" value={editForm.address} onChange={e=>setEditForm({...editForm,address:e.target.value})} placeholder="Địa chỉ"/>
                                    <div className="flex gap-2 justify-end pt-4">
                                        <button onClick={()=>setEditingPerson(null)} className="px-5 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium">Hủy</button>
                                        <button onClick={handleSaveEdit} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700">Lưu</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ADD PERSON MODAL */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                                <h3 className="font-bold text-lg mb-6 flex gap-2 items-center text-slate-800 border-b pb-2"><Icon name="user-plus" size={24} className="text-purple-600"/> Thêm người mới</h3>
                                <div className="space-y-4">
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Họ và tên <span className="text-red-500">*</span></label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.name} onChange={e=>setAddForm({...addForm,name:e.target.value})} placeholder="Nhập họ tên..."/></div>
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">CCCD / Mã định danh</label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.personalId} onChange={e=>setAddForm({...addForm,personalId:e.target.value})} placeholder="Nhập số CCCD..."/></div>
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Địa chỉ</label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.address} onChange={e=>setAddForm({...addForm,address:e.target.value})} placeholder="Nhập thôn/xóm..."/></div>
                                    <div><label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Đối tượng</label><input className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-purple-500" value={addForm.category} onChange={e=>setAddForm({...addForm,category:e.target.value})} placeholder="VD: Hộ Nghèo, Khuyết Tật..."/></div>
                                    <div className="flex gap-2 justify-end pt-4">
                                        <button onClick={()=>setShowAddModal(false)} className="px-5 py-2 text-slate-500 hover:bg-slate-100 rounded-lg font-medium">Hủy</button>
                                        <button onClick={handleAddPerson} className="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-purple-700">Thêm ngay</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DUPLICATE MODAL */}
                    {showDupModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col">
                                <div className="p-4 bg-orange-50 border-b border-orange-100 rounded-t-2xl flex justify-between items-center">
                                    <span className="font-bold text-orange-700 flex items-center gap-2"><Icon name="alert-triangle" size={20}/> Phát hiện {duplicateGroups.length} nhóm trùng</span>
                                    <button onClick={()=>setShowDupModal(false)} className="p-1 rounded hover:bg-orange-100 text-orange-600"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="overflow-y-auto p-4 flex-1 space-y-4 bg-slate-50">
                                    {duplicateGroups.map((g,i) => (
                                        <div key={i} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                                            <div className="font-bold text-sm mb-3 text-slate-800 border-b pb-2">Nhóm tên: "{g[0].name}"</div>
                                            <div className="space-y-2">
                                                {g.map(p => (
                                                    <div key={p.id} className="flex justify-between items-center text-sm bg-slate-50 p-2 rounded-lg">
                                                        <div className="flex flex-col"><span className="font-mono text-xs text-blue-600 font-bold">{p.personalId}</span><span className="text-slate-600 text-xs">{p.address}</span></div>
                                                        <div className="flex gap-2">
                                                            <button onClick={()=>openEditModal(p)} className="text-blue-600 bg-blue-50 p-1.5 rounded hover:bg-blue-100"><Icon name="edit-2" size={14}/></button>
                                                            <button onClick={()=>handleDeletePerson(p.id)} className="text-red-600 bg-red-50 p-1.5 rounded hover:bg-red-100"><Icon name="trash" size={14}/></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
